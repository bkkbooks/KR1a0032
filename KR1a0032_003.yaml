body:
  text: 周易本義卷三宋朱子撰繫辭上傳傳去聲後同繫辭本謂文王周公所作之辭繫于卦爻之下者即今經文此篇乃孔子所述繫辭之傳也以其通論一經之大體凡例故无經可附而自分上下云天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣斷丁亂反見賢遍反天地者陰陽形氣之實體乾坤者易中純陰純陽之卦名也卑高者天地萬物上下之位貴賤者易中卦爻上下之位也動者陽之常靜者陰之常剛柔者易中卦爻陰陽之稱也方謂事情所向言事物善惡各以類分而吉凶者易中卦爻占決之辭也象者日月星辰之屬形者山川動植之屬變化者易中蓍䇿卦爻陰變為陽陽化為陰者也此言聖人作易因陰陽之實體為卦爻之法象莊周所謂易以道陰陽此之謂也是故剛柔相摩八卦相盪盪徒浪反此言易卦之變化也六十四卦之初剛柔兩畫而已兩相摩而為四四相摩而為八八相盪而為六十四鼔之以雷霆潤之以風雨日月運行一寒一暑此變化之成象者乾道成男坤道成女此變化之成形者此兩節又明易之見於實體者與上文相發明也乾知大始坤作成物知猶主也乾主始物而坤作成之承上文男女而言乾坤之理蓋凡物之屬乎陰陽者莫不如此大抵陽先陰後陽施陰受陽之輕清未形而陰之重濁有迹也乾以易知坤以簡能易以䜴反乾健而動即其所知便能始物而无所難故為以易而知大始坤順而靜凡其所能皆從乎陽而不自作故為以簡而能成物易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業人之所為如乾之易則其心明白而人易知如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之協力者衆故有功有親則一於内故可久有功則兼於外故可大德謂得於已者業謂成於事者上言乾坤之德不同此言人法乾坤之道至此則可以為賢矣易簡而天下之理得矣天下之理得而成位乎其中矣成位謂成人之位其中謂天地之中至此則體道之極功聖人之能事可以與天地參矣右第一章此章以造化之實明作經之理又言乾坤之理分見於天地而人兼體之也聖人設卦觀象繫辭焉而明吉凶象者物之似也此言聖人作易觀卦爻之象而繫以辭也剛柔相推而生變化言卦爻陰陽迭相推盪而陰或變陽陽或化陰聖人所以觀象而繫辭衆人所以因蓍而求卦者也是故吉凶者失得之象也悔吝者憂虞之象也吉凶悔吝者易之辭也得失憂虞者事之變也得則吉失則凶憂虞雖未至凶然已足以致悔而取羞矣蓋吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶也故聖人觀卦爻之中或有此象則繫之以此辭也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也柔變而趨於剛者退極而進也剛化而趨於柔者進極而退也既變而剛則晝而陽矣既化而柔則夜而陰矣六爻初二為地三四為人五上為天動即變化也極至也三極天地人之至理三才各􅄲太極也此明剛柔相推以生變化而變化之極復為剛柔流行於一卦六爻之間而占者得因所值以斷吉凶也是故君子所居而安者易之序也所樂而玩者爻之辭也樂音洛易之序謂卦爻所著事理當然之次第玩者觀之詳是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利象辭變已見上凡單言變者化在其中占謂其所值吉凶之決也右第二章此章言聖人作易君子學易之事彖者言乎象者也爻者言乎變者也彖謂卦辭文王所作者爻謂爻辭周公所作者象指全體而言變指一節而言吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也此卦爻辭之通例是故列貴賤者存乎位齊小大者存乎卦辯吉凶者存乎辭位謂六爻之位齊猶定也小謂陰大謂陽憂悔吝者存乎介震无咎者存乎悔上悔乎罪反下悔呼對反介謂辯别之端蓋善惡已動而未形之時也於此憂之則不至於悔吝矣震動也知悔則有以動其補過之心而可以无咎矣是故卦有小大辭有險易辭也者各指其所之易以䜴反小險大易各隨所向右第三章此章釋卦爻辭之通例易與天地準故能彌綸天地之道易書卦爻具有天地之道與之齊準彌如彌縫之彌冇終竟聨合之意綸冇選擇條理之意仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物游魂為變是故知鬼神之情狀此窮理之事以者聖人以易之書也易者陰陽而已幽明死生鬼神皆陰陽之變天地之道也天文則有晝夜上下地理則冇南北高深原者推之於前反者要之於後陰精陽氣聚而成物神之伸也魂游魄降散而為變鬼之歸也與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛知音智樂音洛知命之知如字此聖人盡性之事也天地之道知仁而已知周萬物者天也道濟天下者地也知且仁則知而不過矣旁行者權行之知也不流者守正之仁也既樂天理而又知天命故能无憂而其知益深隨處皆安而无一息之不仁故能不忘其濟物之心而仁益篤蓋仁者愛之理愛者仁之用故其相為表裏如此範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體此聖人至命之事也範如鑄金之有模範圍匡郭也天地之化无窮而聖人為之範圍不使過於中道所謂裁成者也通猶兼也畫夜即幽明生死鬼神之謂如此然後可見至神之妙无有方所易之變化无冇形體也右第四章此章言易道之大聖人用之如此一陰一陽之謂道陰陽迭運者氣也其理則所謂道繼之者善也成之者性也道具於陰而行乎陽繼言其發也善謂化育之功陽之事也成言其其也性謂物之所受言物生則冇性而各具是道也陰之事也周子程子之書言之備矣仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣知音智不知之知如字鮮息淺反仁陽知陰各得是道之一隅故隨其所見而日為全體也日用不知則莫不飲食鮮能知味者又其毎下者也然亦莫不冇是道焉或曰上章以知屬乎天仁屬乎地與此不同何也曰彼以清濁言此以動靜言顯諸仁藏諸用鼔萬物而不與聖人同憂盛德大業至矣哉顯自内而外也仁謂造化之功德之發也藏自外而内也用謂機緘之妙業之本也程子曰天地无心而成化聖人有心而无為富有之謂大業日新之謂盛德張子曰富有者大而无外日新者久而无窮生生之謂易陰生陽陽生陰其變無窮理與書皆然也成象之謂乾效法之謂坤效呈也法謂造化之詳密而可見者極數知來之謂占通變之謂事占筮也事之未定者屬乎陽也事行事也占之已決者屬乎陰也極數知來所以通事之變張忠定公言公事有陰陽意蓋如此陰陽不測之謂神張子曰兩在故不測右第五章此章言道之體用不外乎陰陽而其所以然者則未嘗倚於陰陽也夫易廣矣大矣以言乎遠則不禦以言乎邇則靜而正以言乎天地之閒則備矣夫音扶下同不禦言无盡靜而正言即物而理存備言无所不有夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉翕虚級反闢婢亦反乾坤各有動靜於其四德見之靜體而動用靜别而動交也乾一而實故以質言而曰大坤二而虚故以量言而曰廣蓋天之形雖包於地之外而其氣常行乎地之中也易之所以廣大者以此廣大配天地變通配四時陰陽之義配日月易簡之善配至德易以䜴反易之廣大變通與其所言陰陽之説易簡之德配之天道人事則如此右第六章子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地知音智十翼皆夫子所作不應自著子曰字疑皆後人所加也窮理則知崇如天而德崇循理則禮卑如地而業廣此其取類又以清濁言也天地設位而易行乎其中矣成性存存道義之門天地設位而變化行猶知禮存性而道義出也成性本成之性也存存謂存而又存不已之意也右第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象賾雜亂也象卦之象如説卦所列者聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻斷丁玩反會謂理之所聚而不可遺處通謂理之可行而无所礙處如庖丁解牛會則其族而通則其虚也言天下之至賾而不可惡也言天下之至動而不可亂也惡烏路反惡猶厭也擬之而後言議之而後動擬議以成其變化觀象玩辭觀變玩占而法行之此下七爻則其例也鳴鴆在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎和胡卧反靡音縻行下孟反見賢遍反釋中孚九二爻義同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭斷丁管反臭昌又反釋同人九五爻義言君子之道初若不同而後實无閒斷金如蘭言物莫能閒而其言冇味也初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣藉在夜反錯音措夫音扶釋大過初六爻義勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也釋謙九三爻義德言盛禮言恭言德欲其盛禮欲其恭也亢龍有悔子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也釋乾上九爻義當屬文言此蓋重出不出户庭无咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也幾音機釋節初九爻義子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乗也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也藏才浪反釋解六三爻義右第八章此章言卦爻之用天一地二天三地四天五地六天七地八天九地十此簡本在第十章之首程子曰宜在此今從之此言天地之數陽竒陰耦即所謂河圖者也其位一六居下二七居上三八居左四九居右五十居中就此章而言之則中五為衍母次十為衍子次一二三四為四象之位次六七八九為四象之數二老位於西北二少位於東南其數則各以其類交錯於外也天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此簡本在大衍之後今按宜在此天數五者一三五七九皆奇也地數五者二四六八十皆耦也相得謂一與二三與四五與六七與八九與十各以竒耦為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合二十有五者五竒之積也三十者五耦之積也變化謂一變生水而六化成之二化生火而七變成之三變生木而八化成之四化生金而九變成之五變生土而十化成之鬼神謂凡奇耦生成之屈伸往來者大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五歳再閏故再扐而後掛揲時設反竒紀宜反扐郎得反大衍之數五十蓋以河圖中宫天五乗地十而得之至用以筮則又止用四十冇九蓋皆出於理勢之自然而非人之知力所能損益也兩謂天地也掛懸其一於左手小指之閒也三三才也揲間而數之也竒所揲四數之餘也扐勒於左手中三指之兩間也閏積月之餘日而成月者也五歲之間再積日而再成月故五歲之中凡有再閏然後别起積分如一掛之後左右各一揲而一扐故五者之中凡有再扐然後别起一掛也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日期音基凡此䇿數生於四象蓋河圖四而太陽居一而連九少陰居二而連八少陽居三而連七太陰居四而連六揲蓍之法則通計三變之餘去其初掛之一凡四為竒凡八為耦竒圓圍三耦方圍四三用其全四用其半積而數之則為六七八九而第三變揲數策數亦皆符會蓋餘三竒則九而其揲亦九䇿亦四九三十六是為居一之太陽餘二竒一耦則八而其揲亦八䇿亦四八三十二是為居二之少陰二耦一竒則七而其揲亦七䇿亦四七二十八是為居三之少陽三耦則六而其揲亦六䇿亦四六二十四是為居四之老陰是其變化往來進退離合之妙皆出自然非人之所能為也少陰退而未極乎虚少陽進而未極乎盈故此獨以老陽老陰計乾坤六爻之䇿數餘可推而知也期周一歲也凡三百六十五日四分日之一此特舉成數而槩言之耳二篇之䇿萬有一千五百二十當萬物之數也二篇謂上下經凡陽爻百九十二得六千九百一十二䇿陰爻百九十二得四千六百八䇿合之得此數是故四營而成易十有八變而成卦四營謂分二掛一揲四歸竒也易變易也謂一變也三變成爻十八變則成六爻也八卦而小成謂九變而成三畫得内卦也引而伸之觸類而長之天下之能事畢矣長丁丈反謂已成六爻而視其爻之變與不變以為動靜則一卦可變而為六十四卦以定吉凶凡四千九十六卦也顯道神德行是故可與酬酢可與祐神矣行下孟反道因辭顯行以數神酬酢謂應對祐神謂助神化之功子曰知變化之道者其知神之所為乎變化之道即上文數法是也皆非人之所能為故夫子歎之而門人加子曰以别上文也右第九章此章言天地大衍之數揲蓍求卦之法然亦畧矣意其詳具於大卜筮人之官而今不可考耳其可推者啓蒙備言之易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占四者皆變化之道神之所為者也是以君子將有為也將有行也問焉而以言其受命也如嚮无有遠近幽深遂知來物非天下之至精其孰能與於此嚮許兩反古文嚮字與音預下同此尚辭尚占之事言人以蓍問易求其卦爻之辭而以之發言處事則易受人之命而有以告之如嚮之應聲以決其未來之吉凶也以言與以言者尚其辭之以言義同命則將筮而告蓍之語冠禮筮日宰自右贊命是也參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此參七南反錯七各反綜作弄反此尚象之事變則象之未定者也參者三數之也伍者五數之也既參以變又伍以變一先一後更相考覈以審其多寡之實也錯者交而互之一左一右之謂也綜者總而挈之一低一昂之謂也此亦皆謂揲蓍求卦之事蓋通三揲兩手之䇿以成陰陽老少之畫究七八九六之數以定卦爻動靜之象也參伍錯綜皆古語而參伍尤難曉按荀子云窺敵制變欲伍以參韓非曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以此物伍之以合參史記曰必參而伍之又曰參伍不失漢書曰參伍其賈以類相準此足以相發明矣易无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與於此此四者易之體所以立而用所以行者也易指蓍卦无思无為言其無心也寂然者感之體感通者寂之用人心之妙其動靜亦如此夫易聖人之所以極深而研幾也幾音機下同研猶審也幾微也所以極深者至精也所以研幾者至變也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至所以通志而成務者神之所為也子曰易有聖人之道四焉者此之謂也右第十章此章承上章之意言易之用有此四者子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑夫音扶冒莫報反斷丁亂反開物成務謂使人卜筮以知吉凶而成事業冒天下之道謂卦爻既設而天下之道皆在其中是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明叡知神武而不殺者夫方以知之知音智下知以叡知並同易音亦與音預夫音扶圓神謂變化无方方知謂事有定理易以貢謂變易以告人聖人體具三者之德而无一塵之累无事則其心寂然人莫能窺冇事則神知之用隨感而應所謂无卜筮而知吉凶也神武不殺得其理而不假其物之謂是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫夫音扶神物謂蓍龜湛然純一之謂齋肅然警惕之謂戒明天道故知神物之可興察民故故知其用之不可不有以開其先是以作為卜筮以教人而於此焉齋戒以考其占使其心神明不測如鬼神之能知來也是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神見賢遍反闔闢動靜之機也先言坤者由靜而動也乾坤變通者化育之功也見象形器者生物之序也法者聖人修道之所為而神者百姓自然之日用也是故易有大極是生兩儀兩儀生四象四象生八卦大音泰一毎生二自然之理也易者陰陽之變大極者其理也雨儀者始於一畫以分陰陽四象者次為二畫以分太少八卦者次為三畫而三才之象始備此數言者實聖人作易自然之次第有不假絲毫智力而成者畫卦揲蓍其序皆然詳見序例啓蒙八卦定吉凶吉凶生大業有吉有凶是生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鉤深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜縣音𤣥探吐南反索色白反亹亡偉反富貴謂有天下履帝位立下疑冇闕文亹亹猶勉勉也疑則怠決故勉是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之見賢遍反此四者聖人作易之所由也河圖洛書詳見啓蒙易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也斷丁亂反四象謂陰陽老少示謂示人以所值之卦爻右第十一章此章專言卜筮易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也釋大有上九爻義然在此无所屬或恐是錯簡宜在第八章之末子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神言之所傳者淺象之所示者深觀竒耦二畫包含變化无有窮盡則可見矣變通鼔舞以事而言兩子曰字疑衍其一蓋子曰字皆後人所加故有此誤如近世通書乃周子所自作亦為後人毎章加以周子曰字其設問答處正如此也乾坤其易之縕邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣縕與藴同邪于遮反幾音機縕所包蓄者猶衣之著也易之所有陰陽而已凡陽皆乾凡陰皆坤畫卦定位則二者成列而易之體立矣乾坤毁謂卦畫不立乾坤息謂變化不行是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業卦爻陰陽皆形而下者其理則道也因其自然之化而裁制之變之義也變通二字上章以天言此章以人言是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻重出以起下文極天下之賾者存乎卦鼔天下之動者存乎辭卦即象也辭即爻也化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行行下孟反卦爻所以變通者在人人之所以能神而明之者在德右第十二章繫辭下傳八卦成列象在其中矣因而重之爻在其中矣重直龍反成列謂乾一兑二離三震四巽五坎六艮七坤八之類象謂卦之形體也因而重之謂各因一卦而以八卦次第加之為六十四也爻六爻也既重而後卦有六爻也剛柔相推變在其中矣繫辭焉而命之動在其中矣剛柔相推而卦爻之變往來交錯无不可見聖人因其如此而皆繫之辭以命其吉凶則占者所值當動之爻象亦不出乎此矣吉凶悔吝者生乎動者也吉凶悔吝皆辭之所命也然必因卦爻之動而後見剛柔者立本者也變通者趣時者也趣七樹反一剛一柔各有定位自此而彼變以從時吉凶者貞勝者也貞正也常也物以其所正為常者也天下之事非吉則凶非凶則吉常相勝而不已也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也觀官換反夫音扶觀示也天下之動其變无窮然順理則吉逆理則凶則其所正而常者亦一理而已矣夫乾確然示人易矣夫坤隤然示人簡矣確苦角反易音異隤音頽確然健貌隤然順貌所謂貞觀者也爻也者效此者也象也者像此者也此謂上文乾坤所示之理爻之竒耦卦之消息所以效而象之爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭内謂蓍卦之中外謂蓍卦之外變即動乎内之變辭即見乎外之辭天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義曰人之人今本作仁吕氏從古蓋所謂非衆罔與守邦右第一章此章言卦爻吉凶造化功業古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情包蒲交反王于況反王昭素曰與地之間諸本多有天字俯仰遠近所取不一然不過以驗陰陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象作結繩而為罔罟以佃以漁蓋取諸離罔與網同罟音古佃音田兩目相承而物麗焉包犧氏没神農氏作斵木為耜揉木為耒耒耨之利以教天下蓋取諸益斵涉角反耜音似耒力對反耨奴豆反二體皆木上入下動天下之益莫大於此日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑日中為市上明而下動又借噬為市嗑為合也神農氏没黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉无不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤乾坤變化而无為刳木為舟剡木為楫舟楫之利以濟不通致遠以利天下蓋取諸渙刳口姑反剡以冉反木在水上也致遠以利天下疑衍服牛乘馬引重致遠以利天下蓋取諸隨下動上説重門擊柝以待暴客蓋取諸豫重直龍反柝他各反豫備之意斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過斷丁緩反杵昌吕反掘其月反下止上動弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽睽乖然後威以服之上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯處上聲壯固之意古之葬者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺槨蓋取諸大過衣去聲送死大事而過於厚上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬明決之意右第二章此章言聖人制器尚象之事是故易者象也象也者像也易卦之形理之似也彖者材也彖言一卦之材爻也者效天下之動者也效放也是故吉凶生而悔吝著也悔吝本微因此而著右第三章陽卦多陰陰卦多陽震坎艮為陽卦皆一陽二陰巽離兑為陰卦皆一陰二陽其故何也陽卦竒陰卦耦奇紀宜反凡陽卦皆五畫几陰卦皆四畫其德行何也陽一君而二民君子之道也陰二君而一民小人之道也行下孟反君謂陽民謂陰右第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮此引咸九四爻辭而釋之言理本无二而殊塗百慮莫非自然何以思慮為哉必思而從則所從者亦狹矣日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歳成焉往者屈也來者信也屈信相感而利生焉信音申言往來屈信皆感應自然之常理加憧憧焉則入於私矣所以必思而後冇從也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也蠖紆縛反蟄真立反因言屈信往來之理而又推以言學亦有自然之機也精研其義至於入神屈之至也然乃所以為出而致用之本利其施用无適不安信之極也然乃所以為入而崇德之資内外交相養互相發也過此以往未之或知也窮神知化德之盛也下學之事盡力於精義利用而交養互發之機自不能已自是以上則亦无所用其力矣至於窮神知化乃德盛仁熟而自致耳然不知者往而屈也自致者來而信也是亦感應自然之理而已張子曰氣有陰陽推行冇漸為化合一不測為神此上四節皆以釋咸九四爻義易曰困于石據于蒺蔾入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪釋困六三爻義易曰公用射隼于高墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也射石亦反隼恤允反括古活反括結礙也此釋解上六爻義子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也校音教此釋噬嗑初九爻義善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶何河可反去羌吕反此釋噬嗑上九爻義子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑此釋否九五爻義子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也知音智鮮仙善反折之設反餗音速渥烏角反勝音升此釋鼎九四爻義子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望幾音機先見之見音現斷丁玩反望無方反此釋豫六二爻義漢書吉之之閒有凶字子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復无祇悔元吉幾音機復行之復芳服反祇音其殆危也庶幾近意言近道也此釋復初九爻義天地絪縕萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也細音因縕紆云反絪縕交密之狀醇謂厚而凝也言氣化者也化生形化者也此釋損六三爻義子曰君子安其身而後動易其心而後語定其交而後求君子脩此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶易其之易去聲此釋益上九爻義右第五章子曰乾坤其易之門邪乾陽物也坤陰物也陰陽合德而剛柔有體以體天地之撰以通神明之德邪于遮反撰仕免反諸卦剛柔之體皆以乾坤合德而成故曰乾坤易之門撰猶事也其稱名也雜而不越於稽其類其衰世之意邪萬物雖多无不出於陰陽之變故卦爻之義雖雜出而不差繆然非上古淳質之時思慮所及也故以為衰世之意蓋指文王與紂之時也夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣夫音扶當去聲斷丁玩反而微顯恐當作微顯而開而之而亦疑有誤其稱名也小其取類也大其旨遠其辭文其言曲而中其事肆而隱因貳以濟民行以明失得之報中丁仲反行下孟反肆陳也貳疑也右第六章此章多闕文疑字不可盡通後皆放此易之興也其於中古乎作易者其有憂患乎夏商之未易道中微文王拘於羑里而繫彖辭易道復興是故履德之基也謙德之柄也復德之本也恒德之固也損德之脩也益德之裕也困德之辨也井德之地也巽德之制也履禮也上天下澤定分不易必謹乎此然後其德有以為基而立也謙者自卑而尊人又為禮者之所當執持而不可失者也九卦皆反身脩德以處憂患之事也而冇序焉基所以立柄所以持復者心不外而善端存恒者守不變而常且久懲忿窒慾以脩身遷善𤣥過以長善困以自驗其力井以不變其所然後能巽順於理以制事變也履和而至謙尊而光復小而辨於物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱易以䜴反長丁丈反稱尺證反此如書之九德禮非强世然事皆至極謙以自卑而尊且光復陽微而不亂於羣陰恒處雜而常德不厭損欲先難習熟則易益但充長而不造作困身困而道亨井不動而及物巽稱物之宜而潛隱不露履以和行謙以制禮復以自知恒以一德損以遠害益以興利困以寡怨井以辨義巽以行權和行之行下孟反遠袁萬反寡怨謂少所怨尤辨義謂安而能慮右第七章此章三陳九卦以明處憂患之道易之為書也不可遠為道也屢遷變動不居周流六虚上下無常剛柔相易不可為典要唯變所適遠袁萬反上上聲下去聲遠猶忘也周流六虚謂陰陽流行於卦之六位其出入以度外内使知懼此句未詳疑有脱誤又明於憂患與故无有師保如臨父母雖无師保而常若父母臨之戒懼之至初率其辭而揆其方既有典常茍非其人道不虚行揆葵癸反方道也始由辭以度其理則見其冇典常矣然神而明之則存乎其人也右第八章易之為書也原始要終以為質也六爻相雜唯其時物也要􅄲遥反下同質謂卦體卦必舉其始終而後成體爻則唯其時物而已其初難知其上易知本末也初辭擬之卒成之終易去聲此言初上二爻若夫雜物撰德辨是與非則非其中爻不備夫音扶此謂卦中四爻噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣知者之知音智彖統論一卦六爻之體二與四同功而異位其善不同二多譽四多懼近也柔之為道不利遠者其要无咎其用柔中也要如字又一遥反下章同此以下論中爻同功謂皆陰位異位謂遠近不同四近君故多懼柔不利遠而二多譽者以其柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪勝音升三五同陽位而貴賤不同然以柔居之則危唯剛則能勝之右第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也三畫已具三才重之故六而以上二爻為天中二爻為人下二爻為地道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉當去聲道有變動謂卦之一體等謂遠近貴賤之差相雜謂剛柔之位相閒不當謂爻不當位右第十章易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也邪于遮反易者之易去聲要平聲危懼故得平安慢易則必傾覆易之道也右第十一章夫乾天下之至健也德行恒易以知險夫坤天下之至順也德行恒簡以知阻夫音扶行易並去聲阻莊吕反至健則所行无難故易至順則所行不煩故簡然其於事皆有以知其難而不敢易以處之也是以其有憂患則健者如自高臨下而知其險順者如自下趨丄而知其阻蓋雖易而能知險則不陷於險矣既簡而又知阻則不用於阻矣所以能危能懼而无易者之傾也能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者説音悦侯之二字衍説諸心者心與理會乾之事也研諸慮者理因慮審坤之事也説諸心故冇以定吉凶研諸慮故有以成亹亹是故變化云為吉事有祥象事知器占事知來變化云為故象事可以知器吉事有祥故占事可以知來天地設位聖人成能人謀鬼謀百姓與能與音預天地設位而聖人作易以成其功於是人謀鬼謀雖百姓之愚皆得以與其能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣象謂卦畫爻彖謂卦爻辭變動以利言吉凶以情遷是故愛惡相攻而士凶生遠近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝惡烏路反不相得謂相惡也凶害悔吝皆由此生將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈卦爻之辭亦猶是也右第十二章周易本義卷三
