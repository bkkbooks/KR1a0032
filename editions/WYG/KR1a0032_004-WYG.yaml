  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0032_WYG_004-1a, image: WYG0012/WYG0012-0783c.png}
body:
  text: 周易本義卷四宋朱子撰說卦傳昔者聖人之作易也幽贊於神明而生蓍幽贊神明猶言贊化育龜筴傳曰天下和平王道得而蓍莖長丈其叢生滿百莖參天兩地而倚數參七南反天圓地方圓者一而圍三三各一竒故參天而為三方者一而圍四四合二耦故兩地而為二數皆倚此而起故揲蓍三變之末其餘三竒則三三而九三耦則三二而六兩二一三則為七兩三一二則為八觀變於陰陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命和順從容无所乖逆統言之也理謂隨事得其條理析言之也窮天下之理盡人物之性而合於天道此聖人作易之極功也右第一章昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章兼三才而兩之總言六畫又細分之則陰陽之位閒雜而成文章也右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯薄音博邵子曰此伏羲八卦之位乾南坤兆離東坎西兑居東南震居東北巽居西南艮居西北於是八卦相交而成六十四卦所謂先天之學也數往者順知來者逆是故易逆數也數並上聲起震而厯離兑以至於乾數已生之卦也自巽而厯坎艮以至於坤推未生之卦也易之生卦則以乾兑離震巽坎艮坤為次故皆逆數也右第三章雷以動之風以散之雨以潤之日以烜之艮以止之兑以説之乾以君之坤以藏之烜與晅同説音悦此卦位相對與上章同右第四章帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮説音悦下同帝者天之主宰邵子曰此卦位乃文王所定所謂後天之學也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兑正秋也萬物之所説也故曰説言乎兑戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮嚮讀作向説音悦下同薄音博上言帝此言萬物之隨帝以出入也右第五章此章所推卦位之説多未詳者神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也撓乃飽反熯呼但反悖必内反此去乾坤而專言六子以見神之所為然其位序亦用上章之説未詳其義右第六章乾健也坤順也震動也巽入也坎陷也離麗也艮止也兑説也説音悦此言八卦之性情右第七章乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兑為羊遠取諸物如此右第八章乾為首坤為腹震為足巽為股坎為耳離為目艮為手兑為口近取諸身如此右第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女索色白反長之丈反少詩照反下章同索求也謂揲蓍以求爻也男女指卦中一陰一陽之爻而言右第十章乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果圜音圓駁邦角反荀九家此下有為龍為直為衣為言坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑釜房甫反嗇音色荀九家有為牝為迷為方為囊為裳為黄為帛為漿震為雷為龍為𤣥黃為旉為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮旉音孚筤音郎萑音九馵主樹反蕃音煩荀九家有為玉為鵠為鼔巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦下為長之長如字荀九家有為楊為鸛坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心輮如九反亟紀力反曳以制反荀九家有為宫為律為可為棟為叢棘為狐為蒺蔾為桎梏離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其於木也為科上槁乾音干蟹户買反蠃力禾反蚌步項反荀九家有為牝牛艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節蓏力果反黔其堅反喙況廢反又音呪荀九家有為鼻為虎為狐兑為澤為少女為巫為口舌為毁折為附決其於地也為剛為鹵為妾為羊折之列反鹵力杜反荀九家有為常為輔頰右第十一章此章廣八卦之象其間多不可曉者求之於經亦不盡合也序卦傳有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稺也物稺不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰晁氏曰鄭本无而泰二字泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄有无妄終後可畜故受之以大言物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説之故受之以兑兑者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉右下篇雜卦傳乾剛坤柔比樂師憂樂音洛臨觀之義或與或求以我臨物曰與物來觀我曰求或曰二卦互有與求之義屯見而不失其居蒙雜而著見賢遍反著陟慮反屯震遇坎震動故見坎險不行也蒙坎遇艮坎幽昧艮光明也或曰屯以初言蒙以二言震起也艮止也損益盛衰之始也大畜時也无妄災也止健者時冇適然无妄而災自外至萃聚而升不來也謙輕而豫怠也噬嗑食也賁无色也白受采兑見而巽伏也見賢遍反兑陰外見巽陰内伏隨无故也蠱則飭也飭與勑同隨前无故蠱後當飭剥爛也復反也晉晝也明夷誅也誅傷也井通而困相遇也剛柔相遇而剛見揜也咸速也恒久也咸速恒久渙離也節止也解緩也蹇難也睽外也家人内也否泰反其類也難乃旦反大壯則止遯則退也止謂不退大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也去起呂反既明且動其故多矣離上而坎下也上時掌反下遐嫁反火炎上水潤下小畜寡也履不處也處上聲不處行進之義需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也長丁丈反自大過以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義周易本義卷四
