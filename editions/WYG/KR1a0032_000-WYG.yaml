  text: 欽定四庫全書經部一
  hash: sha256:5111095677a17a819f758c15b1f1277a321ca96156d9a58f561e94ee59984d92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0032_WYG_000-1a, image: WYG0012/WYG0012-0705a.png}
body:
  text: 周易本義易𩔖提要臣等謹案周易本義十二卷宋朱子撰是書以上下經為二卷十翼自為十卷顧炎武日知録曰洪武初頒五經天下儒學而易兼用程朱二氏亦各自為書永樂中修大全乃取朱子卷次割裂附程傳之後而朱子所定之古文仍復淆亂如傳即文王所繫之詞傳者孔子所以釋經之詞後凡言傳倣此乃􅂏上傳條下義今乃削去􅂏上傳三字而附于大哉乾元之下象者卦之上下兩𧰼及兩象之六爻周公所繫之辭也乃象上傳條下義今乃削去象上傳三字而附于天行健之下此篇申􅂏傳象傳之義以盡乾坤二卦之義而餘卦之説因可例推云乃文言條下義今乃削文言二字而附於元者善之長也之下其彖曰象曰文言曰皆朱子本所無復依程傳添入後来士子厭程傳繁多棄去不讀専用本義而大全之本乃朝􅋝所頒不敢輒改遂即監板傳義之本刋去程傳而以程之次序為朱之次序又曰今四書坊本每張十八行每行十七字而註皆小字書詩禮記並同惟易每張二十二行每行二十三字而本義皆作大字與各經不同凡本義中言傳程備矣者又添一傳曰而引其文皆今代人所為云云其辨最為明晳然割裂本義以附程傳自宋董楷已然不始於永樂也詳董楷周易傳義附録條此為咸淳乙丑九江吳革所刋内府以宋槧摹雕者前有革序每卷之末題敷原後學劉宏校正文字行欵及象傳􅂂夬二卦不載程傳一一與炎武所言合卷端惟列有九圖卷末係以易贊五首筮儀一篇與今本升筮儀于前而増列卦歌之𩔖者亦迴乎不同彖上傳標題之下注從王肅本四字今本刪之又雜卦傳咸速也恒乆也下今本惟註咸速恒乆四字讀者恒以為疑考驗此本乃是感速常乆經後人傳刻而訛實為善本故我聖祖仁皇帝御纂周易折中即用此本之次序復先聖之舊文破俗儒之漏見洵讀易之家所宜奉為􅂜訓者矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書周易本義序易之為書卦爻􅂏象之義備而天地萬物之情見聖人之憂天下來世其至矣先天下而開其物後天下而成其務是故極其數以定天下之象著其象以定天下之吉凶六十四卦三百八十四爻皆所以順性命之理盡變化之道也散之在理則有萬殊統之在道則无二致所以易有太極是生兩儀太極者道也兩儀者隂陽也隂陽一道也大極无極也萬物之生負隂而抱陽莫不有太極莫不有兩儀絪緼交感變化不窮形一受其生神一發其智情偽出焉萬緒起焉易所以定吉凶而生大業故易者隂陽之道也卦者隂陽之物也爻者隂陽之動也卦雖不同所同者竒耦爻雖不同所同者九六是以六十四卦為其體三百八十四爻互為其用遠在六合之外近在一身之中暫於瞬息㣲於動靜莫不有卦之𧰼焉莫不有爻之義焉至哉易乎其道至大而无不包其用至神而无不存時固未始有一而卦未始有定𧰼事固未始有窮而爻亦未始有定位以一時而索卦則拘於无變非易也以一事而明爻則窒而不通非易也知所謂卦爻􅂏象之義而不知有卦爻􅂏象之用亦非易也故得之於精神之運心術之動與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶然後可以謂之知易也雖然易之有卦易之已形者也卦之有爻卦之己見者也己形己見者可以知言未形未見者不可以名求則所謂易者果何如哉此學者所當知也周易本義圖目河圖圖洛書圖伏羲八卦次序圖伏羲八卦方位圖伏羲六十四卦次序圖伏羲六十四卦方位圖文王八卦次序圖文王八卦方位圖卦變圖卦變圖彖傳或以卦變為説今作此圖以明之篕易中之一義非畫卦作易之本指也凡一隂一陽之卦各六皆自復姤而來五隂五陽卦同圖異剥比豫謙師復夬大有小畜履同人姤凡二隂二陽之卦各十有五皆自臨遯而來四隂四陽卦同圖異頥屯震明夷臨䝉坎解升艮蹇小過晋萃觀大過鼎巽訟遯革離家人无妄兌睽中孚需大畜大壯凡三隂三陽之卦各二十皆自泰否而來損節歸妹泰賁既濟豐噬嗑隨益蠱井恒未濟困渙旅咸漸否咸旅漸否困未濟渙井蠱恒隨噬嗑益既濟賁豐節損歸妹泰凡四隂四陽之卦各十有五皆自大壯觀而來二隂二陽圖己見前大畜需大壯睽兌中孚離革家人无妄鼎大過巽訟遯萃晋觀蹇艮小過坎䝉解升屯頥震明夷臨凡五隂五陽之卦各六皆自夬剥而來一隂一陽圖已見前大有夬小畜履同人姤比剥豫謙師復右易之圖九有天地自然之易有伏羲之易有文王周公之易有孔子之易自伏羲以上皆无文字只有圖畫最宜深玩可見作易本原精㣲之意文王字位過密無法显示周易本義卦歌八卦取象歌乾三連坤六斷震仰盂艮覆盌離中虛坎中滿兌上缺巽下斷分宫卦象次序乾坎艮震為陽四宫巽離坤兌為隂四宫毎宫隂陽八卦乾為天天風姤天山遯天地否風地觀山地剥火地晋火天大有坎為水水澤節水雷屯水火既濟澤火革雷火豐地火明夷地水師艮為山山火賁山天大畜山澤損火澤睽天澤履風澤中孚風山漸震為雷雷地豫雷水解雷風恒地風升水風井澤風大過澤雷隨巽為風風天小畜風火家人風雷益天雷无妄火雷噬嗑山雷頥山風蠱離為火火山旅火風鼎火水未濟山水䝉風水渙天水訟天火同人坤為地地雷復地澤臨地天泰雷天大壯澤天夬水天需水地比兌為澤澤水困澤地萃澤山咸水山蹇地山謙雷山小過雷澤歸妹上下經卦名次序歌乾坤屯䝉需訟師比小畜兮履㤗否同人大有謙豫隨蠱臨觀兮噬嗑賁剥復无妄大畜頥大過坎離三十備咸恒遯兮及大壯晋與明夷家人睽蹇解損益夬姤萃升困井革鼎震繼艮漸歸妹豐旅巽兑渙節兮中孚至小過既濟兼未濟是為下經三十四上下經卦變歌訟自遯變泰歸妹否從漸來隨三位首困噬嗑未濟兼蠱三變賁井既濟噬嗑六五本益生賁原於損既濟㑹无妄訟來大畜需咸旅恒豐皆疑似晋從觀更睽有三離與中孚家人繫蹇利西南小過來解升二卦相為贅鼎由巽變漸渙旅渙自漸來終於是筮儀擇地潔處為蓍室南户置牀於室中央牀大約長五尺廣三尺毋太近壁蓍五十莖韜以纁帛貯以皁囊納之櫝中置於牀北櫝以竹筒或堅木或布漆為之圓徑三寸如蓍之長半為底半為蓋下别為臺函之使不偃仆設木格於櫝南居牀二分之北格以横木板為之高一尺長竟牀當中為兩大刻相距一尺大刻之西為三小刻相距各五寸許下施横足側立案上置香爐一於格南香合一於爐南日炷香致敬將筮則灑掃拂拭滌硯一注水及筆一墨一黄漆板一於爐東東上筮者齊潔衣冠北面盥手焚香致敬齊側皆反筮者北面見儀禮若使人筮則主人焚香畢少退北面立筮者進立於牀前少西南向受命主人直述所占之事筮者許諾主人右還西向立筮者右還北向立兩手奉櫝蓋置於格南爐北出蓍於櫝去囊解韜置於櫝東合五十䇿兩手執之熏於爐上此後所用蓍䇿之數其説並見啟䝉命之曰假爾泰筮有常假爾泰筮有常某官姓名今以某事云云未知可否爰質所疑於神於靈吉凶得失悔吝憂虞惟爾有神尚明告之乃以右手取其一策反於櫝中而以左右手中分四十九策置格之左右兩大刻此第一營所謂分而為二以象兩者也次以左手取左大刻之策執之而以右手取右大刻之一䇿掛於左手之小指閒此第二營所謂掛一以象三者也次以右手四揲左手之策揲食列反此第三營之半所謂揲之以四以象四時者也次歸其所餘之䇿或一或二或三或四而扐之左手无名指閒此第四營之半所謂歸竒於扐以象閏者也次以右手反過揲之䇿於左大刻遂取右大刻之策執之而以左手四揲之此第三營之半次歸其所餘之䇿如前而扐之左手中指之閒此第四營之半所謂再扐以象再閏者也一變所餘之䇿左一則右必三左二則右亦二左三則右必一左四則右亦四通掛一之䇿不五則九五以一其四而為竒九以兩其四而為耦竒者三而耦者一也次以右手反過揲之䇿於右大刻而合左手一掛二扐之䇿置於格上第一小刻以東為上後放此是為一變再以兩手取左右大刻之蓍合之或四十四䇿或四十䇿復四營如第一變之儀而置其掛扐之䇿於格上第二小刻是為二變復扶又反營於平反下同二變所餘之䇿左一則右必二左二則右必一左三則右必四左四則右必三通掛一之䇿不四則八四以一其四而為竒八以兩其四而為耦竒耦各得四之二焉又再取左右大刻之蓍合之或四十䇿或三十六䇿或三十二䇿復四營如第二變之儀而置其掛扐之䇿於格上第三小刻是為三變三變餘䇿與二變同三變既畢乃視其三變所得掛扐過揲之䇿而畫其爻於版掛扐之數五四為竒九八為耦掛扐三竒合十三策則過揲三十六䇿而老陽其畫為口所謂重也掛扐兩竒一耦合十七䇿則過揲三十二䇿而為少隂其畫為􅄲所謂拆也掛扐兩耦一竒合二十一䇿則過揲二十八䇿而為少陽其畫為一所謂單也掛扐三耦合二十五䇿則過揲二十四䇿而為老隂其畫為㐅所謂交也如是毎三變而成爻第一第四第七第十第十三第十六凡六變並同但第三變以下不命而但用四十九蓍耳第二第五第八第十一第十四第十七凡六變亦同第三第六第九第十二第十五第十八凡六變亦同凡十有八變而成卦乃考其卦之變而占其事之吉凶卦變别有圖説見啓䝉禮畢韜蓍襲之以囊入櫝加蓋斂筆硯墨版再焚香致敬而退如使人筮則主人焚香揖筮者而退
