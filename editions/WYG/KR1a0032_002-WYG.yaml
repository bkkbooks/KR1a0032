body:
  text: 周易本義卷二宋朱子撰周易下經艮下兌上咸亨利貞取女吉取七具反咸交感也兌柔在上艮剛在下而交相感應又艮止則感之專兌説則應之至又艮以少男下於兌之少女男先於女得男女之正婚姻之時故其卦為咸其占亨而利貞取女則吉蓋感有必通之理然不以貞則失其亨而所為皆凶矣彖曰咸感也釋卦名義柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也説音悦男下之下遐嫁反以卦體卦徳卦象釋卦辭或以卦變言柔上剛下之義曰咸自旅來柔上居六剛下居五也亦通天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣極言感通之理象曰山上有澤咸君子以虛受人山上有澤以虛而通也初六咸其拇拇茂后反拇足大指也咸以人身取象感於最下咸拇之象也感之尚淺欲進未能故不言吉凶此卦雖主於感然六爻皆宜靜而不宜動也象曰咸其拇志在外也六二咸其腓凶居吉腓房非反腓足肚也欲行則先自動躁妄而不能固守者也二當其處又以隂柔不能固守故取其象然有中正之徳能居其所故其占動凶而靜吉也象曰雖凶居吉順不害也九三咸其股執其隨往吝股隨足而動不能自專者也執者主當持守之意下二爻皆欲動者三亦不能自守而隨之往則吝矣故其象占如此象曰咸其股亦不處也志在隨人所執下也言亦者因前二爻皆欲動而云也二爻隂躁其動也宜九三陽剛居止之極宜靜而動可吝之甚也九四貞吉悔亡憧憧往來朋從爾思憧昌容反又音同九四居股之上脢之下又當三陽之中心之象咸之主也心之感物當正而固乃得其理今九四乃以陽居隂為失其正而不能固故因占設戒以為能正而固則吉而悔亡若憧憧往來不能正固而累於私感則但其朋類從之不復能及逺矣象曰貞吉悔亡未感害也憧憧往來未光大也感害言不正而感則有害也九五咸其脢无悔脢武杯反又音每脢背肉在心上而相背不能感物而无私係九五適當其處故取其象而戒占者以能如是則雖不能感物而亦可以无悔也象曰咸其脢志末也志末謂不能感物上六咸其輔頰舌頰古協反輔頰舌皆所以言者而在身之上上六以隂居説之終處咸之極感人以言而无其實又兌為口舌故其象如此凶咎可知象曰咸其輔頰舌滕口説也滕騰通用巽下震上恒亨无咎利貞利有攸往恒常久也為卦震剛在上巽柔在下震雷巽風二物相與巽順震動為巽而動二體六爻隂陽相應四者皆理之常故為恒其占為能久於其道則亨而无咎然又必利於守貞則乃為得所常久之道而利有所往也彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒以卦體卦象卦徳釋卦名義或以卦變言剛上柔下之義曰恒自豐來剛上居二柔下居初也亦通恒亨无咎利貞久於其道也天地之道恒久而不已也恒固能亨且无咎矣然必利於正乃為久於其道不正則久非其道矣天地之道所以長久亦以正而已矣利有攸往終則有始也久於其道終也利有攸往始也動靜相生循環之理然必靜為主也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣極言恒久之道象曰雷風恒君子以立不易方初六浚恒貞凶无攸利初與四為正應理之常也然初居下而在初未可以深有所求四震體而陽性上而不下又為二三所隔應初之意異乎常矣初之柔暗不能度勢又以隂居巽下為巽之主其性務入故深以常理求之浚恒之象也占者如此則雖貞亦凶而无所利矣象曰浚恒之凶始求深也九二悔亡以陽居隂本當有悔以其久中故得亡也象曰九二悔亡能久中也九三不恒其徳或承之羞貞吝位雖得正然過剛不中志從於上不能久於其所故為不恒其徳或承之羞之象或者不知其何人之辭承奉也言人皆得奉而進之不知其所自來也貞吝者正而不恒為可羞吝申戒占者之辭象曰不恒其徳无所容也九四田无禽以陽居隂久非其位故為此象占者田无所獲而凡事亦不得其所求也象曰久非其位安得禽也六五恒其德貞婦人吉夫子凶以柔中而應剛中常久不易正而固矣然乃婦人之道非夫子之宜也故其象占如此象曰婦人貞吉從一而終也夫子制義從婦凶也上六振恒凶振者動之速也上六居恒之極處震之終恒極則不常震終則過動又隂柔不能固守居上非其所安故有振恒之象而其占則凶也象曰振恒在上大无功也艮下乾上遯亨小利貞遯徒困反遯退避也為卦二隂浸長陽當退避故為遯六月之卦也陽雖當遯然九五當位而下有六二之應若猶可以有為但二隂浸長於下則其勢不可以不遯故其占為君子能遯則身雖退而道亨小人則利於守正不可以浸長之故而遂侵迫於陽也小謂隂柔小人也此卦之占與否之初二兩爻相類彖曰遯亨遯而亨也剛當位而應與時行也以九五一爻釋亨義小利貞浸而長也長丁丈反以下二隂釋小利貞遯之時義大矣哉隂方浸長處之為難故其時義為尤大也象曰天下有山遯君子以逺小人不惡而嚴逺袁萬反天體无窮山高有限遯之象也嚴者君子自守之常而小人自不能近初六遯尾厲勿用有攸往遯而在後尾之象危之道也占者不可以有所往但晦處靜俟可免災耳象曰遯尾之厲不往何災也六二執之用黄牛之革莫之勝說勝音升説吐活反以中順自守人莫能解必遯之志也占者固守亦當如是象曰執用黄牛固志也九三係遯有疾厲畜臣妾吉畜許六反下比二隂當遯而有所係之象有疾而危之道也然以畜臣妾則吉蓋君子之於小人惟臣妾則不必其賢而可畜耳故其占如此象曰係遯之厲有疾憊也畜臣妾吉不可大事也憊音敗九四好遯君子吉小人否好呼報反否方有反之下應初六而乾體剛健有所好而能絶之以遯象也唯自克之君子能之而小人不能故占者君子則吉而小人否也象曰君子好遯小人否也九五嘉遯貞吉剛陽中正下應六二亦柔順而中正遯之嘉美者也占者如是而正則吉矣象曰嘉遯貞吉以正志也上九肥遯无不利以剛陽居卦外下无係應遯之逺而處之裕者也故其象占如此肥者寛裕自得之意象曰肥遯无不利无所疑也乾下震上大壮利貞大謂陽也四陽盛長故為大壮二月之卦也陽壮則占者吉亨不假言但利在正固而已彖曰大壮大者壮也剛以動故壮釋卦名義以卦體言則陽長過中大者壮也以卦徳言則乾剛震動所以壮也大壮利貞大者正也正大而天地之情可見矣釋利貞之義而極言之象曰雷在天上大壮君子以非禮弗履自勝者强初九壮于趾征凶有孚趾在下而進動之物也剛陽處下而當壮時壮于進者也故有此象居下而壮于進其凶必矣故其占又如此象曰壮于趾其孚窮也言必困窮九二貞吉以陽居隂已不得其正矣然所處得中則猶可因以不失其正故戒占者使因中以求正然後可以得吉也象曰九二貞吉以中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角羝音低羸力追反過剛不中當壮之時是小人用壮而君子則用罔也罔无也視有如无君子之過於勇者也如此則雖正亦危矣羝羊剛壮喜觸之物藩籬也羸困也貞厲之占其象如此象曰小人用壯君子罔也小人以壮敗君子以罔困九四貞吉悔亡藩決不羸壯于大輿之輹輹音福貞吉悔亡與咸九四同占藩決不羸承上文而言也決開也三前有四猶有藩焉四前二隂則藩決矣壮于大輿之輹亦可進之象也以陽居隂不極其剛故其象如此象曰藩決不羸尚往也尚上通六五喪羊于易无悔喪息浪反象同易以䜴反一音亦旅卦同卦體似兌有羊象焉外柔而内剛者也獨六五以柔居中不能抵觸雖失其壮然亦无所悔矣故其象如此而占亦與咸九五同易容易之易言忽然不覺其亡也或作疆場之場亦通漢食貨志場作易象曰喪羊于易位不當也上六羝羊觸藩不能退不能遂无攸利艱則吉壮終動極故觸藩而不能退然其質本柔故又不能遂其進也其象如此其占可知然猶幸其不剛故能艱以處則尚可以得吉也象曰不能退不能遂不詳也艱則吉咎不長也坤下離上晉康侯用錫馬蕃庶晝日三接晉進也康侯安國之侯也錫馬蕃庶畫日三接言多受大賜而顯被親禮也蓋其為卦上離下坤有日出地上之象順而麗乎大明之徳又其變自觀而來為六四之柔進而上行以至於五占者有是三者則亦當有是寵也彖曰晉進也釋卦名義明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也上行之上時掌反以卦象卦徳卦變釋卦辭象曰明出地上晉君子以自昭明徳昭明之也初六晉如摧如貞吉罔孚裕无咎以隂居下應不中正有欲進見摧之象占者如是而能守正則吉設不為人所信亦當處以寛裕則无咎也象曰晉如摧如獨行正也裕无咎未受命也初居下位未有官守之命六二晉如愁如貞吉受兹介福于其王母六二中正上无應援故欲進而愁占者如是而能守正則吉而受福于王母也王母指六五蓋享先妣之吉占而凡以隂居尊者皆其類也象曰受兹介福以中正也六三衆允悔亡三不中正宜有悔者以其與下二隂皆欲上進是以為衆所信而悔亡也象曰衆允之志上行也九四晉如鼫鼠貞厲鼫音石不中不正以竊高位貪而畏人蓋危道也故為鼫鼠之象占者如是雖正亦危象曰鼫鼠貞厲位不當也六五悔亡失得勿恤往吉无不利以隂居陽宜有悔矣以大明在上而下皆順從故占者得之則其悔亡又一切去其計功謀利之心則往吉而无不利也然亦必有其徳乃應其占耳象曰失得勿恤往有慶也上九晉其角維用伐邑厲吉无咎貞吝角剛而居上上九剛進之極有其象矣占者得之而以伐其私邑則雖危而吉且无咎然以極剛治小邑雖得其正亦可吝矣象曰維用伐邑道未光也離下坤上明夷利艱貞夷傷也為卦下離上坤日入地中明而見傷之象故為明夷又其上六為暗之主六五近之故占者利於艱難以守正而自晦其明也彖曰明入地中明夷以卦象釋卦名内文明而外柔順以蒙大難文王以之難去聲下同以卦徳釋卦義蒙大難謂遭紂之亂而見囚也利艱貞晦其明也内難而能正其志箕子以之以六五一爻之義釋卦辭内難謂為紂近親在其國内如六五之近於上六也象曰明入地中明夷君子以莅衆用晦而明初九明夷于飛垂其翼君子于行三日不食有攸往主人有言飛而垂翼見傷之象占者行而不食所如不合時義當然不得而避也象曰君子于行義不食也唯義所在不食可也六二明夷夷于左股用拯馬壮吉拯之陵反渙初爻同傷而未切救之速則免矣故其象占如此象曰六二之吉順以則也九三明夷于南狩得其大首不可疾貞以剛居剛又在明體之上而屈於至暗之下正與上六闇主為應故有向明除害得其首惡之象然不可以亟也故有不可疾貞之戒成湯起於夏臺文王興於羑里正合此爻之義而小事亦有然者象曰南狩之志乃大得也六四入于左腹獲明夷之心于出門庭此爻之義未詳竊疑左腹者幽隠之處獲明夷之心于出門庭者得意於逺去之義言筮而得此者其自處當如是也蓋離體為至明之徳坤體為至闇之地下三爻明在闇外故隨其逺近髙下而處之不同六四以柔正居闇地而尚淺故猶可以得意於逺去五以柔中居闇地而已迫故為内難正志以晦其明之象上則極乎闇矣故為自傷其明以至於闇而又足以傷人之明蓋下五爻皆為君子獨上一爻為闇君也象曰入于左腹獲心意也意叶音臆六五箕子之明夷利貞居至闇之地近至闇之君而能正其志箕子之象也貞之至也利貞以戒占者象曰箕子之貞明不可息也上六不明晦初登于天後入于地以隂居坤之極不明其徳以至於晦始則處高位以傷人之明終必至於自傷而墜厥命故其象如此而占亦在其中矣象曰初登于天照四國也後入于地失則也照四國以位言離下巽上家人利女貞家人者一家之人卦之九五六二外内各得其正故為家人利女貞者欲先正乎内也内正則外无不正矣彖曰家人女正位乎内男正位乎外男女正天地之大義也以卦體九五六二釋利女貞之義家人有嚴君焉父母之謂也亦謂二五父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣上父初子五三夫四二婦五兄三弟以卦畫推之又有此象象曰風自火出家人君子以言有物而行有恒行下孟反身修則家治矣初九閑有家悔亡初九以剛陽處有家之始能防閑之其悔亡矣戒占者當如是也象曰閑有家志未變也志未變而豫防之六二无攸遂在中饋貞吉六二柔順中正女之正位乎内者也故其象占如此象曰六二之吉順以巽也九三家人嗃嗃悔厲吉婦子嘻嘻終吝嗃呼落反嘻喜悲反象同以剛居剛而不中過乎剛者也故有嗃嗃嚴厲之象如是則雖有悔厲而吉也嘻嘻者嗃嗃之反吝之道也占者各以其徳為應故兩言之象曰家人嗃嗃未失也婦子嘻嘻失家節也六四富家大吉陽主義隂主利以隂居隂而在上位能富其家者也象曰富家大吉順在位也九五王假有家勿恤吉假更白反假至也如假于太廟之假有家猶言有國也九五剛健中正下應六二之柔順中正王者以是至于其家則勿用憂恤而吉可必矣蓋聘納后妃之吉占而凡有是徳者遇之皆吉也象曰王假有家交相愛也程子曰夫愛其内助婦愛其刑家上九有孚威如終吉上九以剛居上在卦之終故言正家久逺之道占者必有誠信嚴威則終吉也象曰威如之吉反身之謂也謂非作威也反身自治則人畏服之矣兌下離上睽小事吉睽苦圭反睽乖異也為卦上火下澤性相違異中女少女志不同歸故為睽然以卦徳言之内説而外明以卦變言之則自離來者柔進居三自中孚來者柔進居五自家人来者兼之以卦體言之則六五得中而下應九二之剛是以其占不可大事而小事尚有吉之道也彖曰睽火動而上澤動而下二女同居其志不同行上下俱上聲下同以卦象釋卦名義説而麗乎明柔進而上行得中而應乎剛是以小事吉説音悦以卦徳卦變卦體釋卦辭天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉極言其理而贊之象曰上火下澤睽君子以同而異二卦合體而性不同初九悔亡喪馬勿逐自復見惡人无咎喪去聲上无正應有悔也而居睽之時同德相應其悔亡矣故有喪馬勿逐而自復之象然亦必見惡人然後可以辟咎如孔子之於陽貨也象曰見惡人以辟咎也辟音避九二遇主于巷无咎二五隂陽正應居睽之時乖戾不合必委曲相求而得會遇乃為无咎故其象占如此象曰遇主于巷未失道也本其正應非有邪也六三見輿曳其牛掣其人天且劓无初有終曳以制反掣昌逝反劓魚器反六三上九正應而三居二陽之間後為二所曳前為四所掣而當睽之時上九猜狠方深故又有髠劓之傷然邪不勝正終必得合故其象占如此象曰見輿曳位不當也无初有終遇剛也九四睽孤遇元夫交孚厲无咎夫如字睽孤謂无應遇元夫謂得初九交孚謂同徳相信然當睽時故必危厲乃得无咎占者亦如是也象曰交孚无咎志行也六五悔亡厥宗噬膚往何咎噬市制反以隂居陽悔也居中得應故能亡之厥宗指九二噬膚言易合六五有柔中之徳故其象占如是象曰厥宗噬膚往有慶也上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪寇婚媾往遇雨則吉弧音胡說吐活反媾古豆反睽弧謂六三為二陽所制而已以剛處明極睽極之地又自猜狠而乖離也見豕負塗見其汚也載鬼一車以无為有也張弧欲射之也說弧疑稍釋也匪宼婚媾知其非宼而實親也往遇雨則吉疑盡釋而睽合也上九之與六三先睽後合故其象占如此象曰遇雨之吉羣疑亡也艮下坎上蹇利西南不利東北利見大人貞吉蹇紀免反蹇難也足不能進行之難也為卦艮下坎上見險而止故為蹇西南平易東北險阻又艮方也方在蹇中不宜走險又卦自小過而來陽進則往居五而得中退則入於艮而不進故其占曰利西南不利東北當蹇之時必見大人然後可以濟難又必守正然後得吉而卦之九五剛健中正有大人之象自二以上五爻皆得正位則又貞之義也故其占又曰利見大人貞吉蓋見險者貴於能止而又不可終於止處險者利於進而不可失其正也彖曰蹇難也險在前也見險而能止知矣哉難乃旦反知音智以卦德釋卦名義而贊其美蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉以卦變卦體釋卦辭而贊其時用之大也象曰山上有水蹇君子以反身修德初六往蹇来譽往遇險来得譽象曰往蹇來譽宜待也六二王臣蹇蹇匪躬之故柔順中正正應在上而在險中故蹇而又蹇以求濟之非以其身之故也不言吉凶者占者但當鞠躬盡力而已至於成敗利鈍則非所論也象曰玉臣蹇蹇終无尤也事雖不濟亦无可尤九三往蹇來反反就二隂得其所安象曰往蹇來反内喜之也六四往蹇來連連於九三合力以濟象曰往蹇來連當位實也當去聲九五大蹇朋來大蹇者非常之蹇也九五居尊而有剛健中正之德必有朋来而助之者占者有是德則有是助矣象曰大蹇朋來以中節也上六往蹇來碩古利見大人已在卦極往无所之益以蹇耳来就九五與之濟蹇則有碩大之功大人指九五曉占者宜如是也象曰往蹇來碩志在内也利見大人以從貴也坎下震上解利西南无所往其來復吉有攸往夙吉解音蠏彖傳大象同解難之散也居險能動則出於險之外矣解之象也難之既解利於平易安靜不欲久為煩擾且其卦自升来三往居四入於坤體二居其所而又得中故利於西南平易之地若无所往則宜来復其所而安靜若尚有所往則宜早往早復不可久煩擾也彖曰解險以動動而免乎險解以卦徳釋卦名義解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也以卦變釋卦辭坤為衆得衆謂九四入坤體得中有功皆指九二天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉極言而贊其大也象曰雷雨作解君子以赦過宥罪初六无咎難既解矣以柔在下上有正應何咎之有故其占如此象曰剛柔之際義无咎也九二田獲三狐得黄矢貞吉此爻取象之意未詳或曰卦凡四隂除六五君位餘三隂即三狐之象也大抵此爻為卜田之吉占亦為去邪媚而得中直之象能守其正則无不吉矣象曰九二貞吉得中道也六三負且乘致寇至貞吝乘如字又石證反繫辭備矣貞吝言雖以正得之亦可羞也唯避而去之為可免耳象曰負且乘亦可醜也自我致戎又誰咎也戎古本作寇九四解而拇朋至斯孚解佳買反象同拇茂后反相指初初與四皆不得其位而相應應之不以正者也然四陽初隂其類不同若能解而去之則君子之朋至而相信也象曰解而拇未當位也六五君子維有解吉有孚于小人解音蠏象同卦凡四隂而六五當君位與三隂同類者必解而去之則吉也孚驗也君子有解以小人之退為驗也象曰君子有解小人退也上六公用射隼于高墉之上獲之无不利射食亦反隼荀尹反繫辭備矣象曰公用射隼以解悖也解佳買反兌下艮上損有孚元吉无咎可貞利有攸往損減省也為卦損下卦上畫之陽益上卦上畫之隂損兌澤之深益艮山之高損下益上損内益外剥民奉君之象所以為損也損所當損而有孚信則其占當有此下四者之應矣曷之用二簋可用享簋音軌言當損時則至薄无害彖曰損損下益上其道上行上行之上時掌反以卦體釋卦名義損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行此釋卦辭時謂當損之時象曰山下有澤損君子以懲忿窒欲懲直升反君子修身所當損者莫切於此初九已事遄往无咎酌損之已音以遄市專反四爻同初九當損下益上之時上應六四之隂輟所為之事而速往以益之无咎之道也故其象占如此然居下而益上亦當斟酌其淺深也象曰已事遄往尚合志也尚上通九二利貞征凶弗損益之九二剛中志在自守不肯妄進故占者利貞而征則凶也弗損益之言不變其所守乃所以益上也象曰九二利貞中以為志也六三三人行則損一人一人行則得其友下卦本乾而損上爻以益坤三人行而損一人也一陽上而一隂下一人行而得其友也兩相與則專三則雜而亂卦有此象故戒占者當致一也象曰一人行三則疑也六四損其疾使遄有喜瓦咎以初九之陽剛益已而損其陰柔之疾唯速則善戒占者如是則无咎矣象曰損其疾亦可喜也六五或益之十朋之龜弗克違元吉柔順虛中以居尊位當損之時受天下之益者也兩龜為朋十朋之龜大寶也或以此益之而不能辭其吉可知占者有是德則獲其應也象曰六五元吉自上祐也上九弗損益之无咎貞吉利有攸往得臣无家上九當損下益上之時居卦之上受益之極而欲自損以益人也然居上而益下有所謂惠而不費者不待損已然後可以益人也能如是則无咎然亦必以正則吉而利有所往惠而不費其惠廣矣故又曰得臣无家象曰弗損益之大得志也震下巽上益利有攸往利涉大川益増益也為卦損上卦初畫之陽益下卦初畫之陰自上卦而下於下卦之下故為益卦之九五六二皆得中正下震上巽皆木之象故其占利有所往而利涉大川也彖曰益損上益下民説无疆自上下下其道大光上下之下去聲以卦體釋卦名義利有攸往中正有慶利涉大川木道乃行以卦體卦象釋卦辭益動而巽日進无疆天施地生其益无方凡益之道與時偕行施始豉反動巽二卦之徳乾下施坤上生亦上文卦體之義又以此極言賛益之大象曰風雷益君子以見善則遷有過則改風雷之勢交相助益遷善改過益之大者而其相益亦猶是也初九利用為大作元吉无咎初雖居下然當益下之時受上之益者也不可徒然无所報效故利用為大作必元吉然後得无咎象曰元吉无咎下不厚事也下本不當任厚事故不如是不足以塞咎也六二或益之十朋之龜弗克違永貞吉王用享于帝吉六二當益下之時虛中處下故其象占與損六五同然爻位皆隂故以永貞為戒以其居下而受上之益故又為卜郊之吉占象曰或益之自外來也或者衆无定主之辭六三益之用凶事无咎有孚中行告公用圭六三陰柔不中不正不當得益者也然當益下之時居下之上故有益之以凶事者蓋警戒震動乃所以益之也占者如此然後可以无咎又戒以有孚中行而告公用圭也用圭所以通信象曰益用凶事固有之也益用凶事欲其困心衡慮而固有之也六四中行告公從利用為依遷國三四皆不得中故皆以中行為戒此言以益下為心而合於中行則告公而見從矣傳曰周之東遷晉鄭焉依蓋古者遷國以益下必有所依然後能立此爻又為遷國之吉占也象曰告公從以益志也九五有孚惠心勿問元吉有孚惠我德上有信以惠於下則下亦有信以惠於上矣不問而元吉可知象曰有孚惠心勿問之矣惠我徳大得志也上九莫益之或擊之立心勿恒凶以陽居益之極求益不已故莫益而或擊之立心勿恒戒之也象曰莫益之偏辭也或擊之自外來也莫益之者猶從其求益之偏辭而言也若究而言之則又有擊之者矣乾下兌上夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬古快反號户羔反卦内並同夬決也陽決陰也三月之卦也以五陽去一陰決之而已然其決之也必正名其罪而盡誠以呼號其衆相與合力然亦尚有危厲不可安肆又當先治其私而不可專尚威武則利有所往也皆戒之之辭彖曰夬決也剛決柔也健而説決而和説音悦釋卦名義而贊其徳揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也長丁丈反此釋卦辭柔乘五剛以卦體言謂以一小人加於衆君子之上是其罪也剛長乃終謂一變則為純乾也象曰澤上於天夬君子以施祿及下居徳則忌上時掌反施始䜴反澤上於天潰決之勢也施祿及下潰決之意也居徳則忌未詳初九壮于前趾往不勝為咎前猶進也當決之時居下任壮不勝宜矣故其象占如此象曰不勝而往咎也九二惕號莫夜有戎勿恤莫音暮九二當決之時剛而居柔又得中道故能憂惕號呼以自戒備而莫夜有戎亦可无患也象曰有戎勿恤得中道也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎頄求龜反頄顴也九三當決之時以剛而過乎中是欲決小人而剛壮見于面目也如是則有凶道矣然在衆陽之中獨與上六為應若能果決其決不係私愛則雖合於上六如獨行遇雨至於若濡而為君子所愠然終必能決去小人而无所咎也温嶠之於王敦其事類此象曰君子夬夬終无咎也九四臀无膚其行次且牽羊悔亡聞言不信臀徒敦反次七私反且七余反姤卦同以陽居隂不中不正居則不安行則不進若不與衆陽競進而安出其後則可以亡其悔然當決之時志在上進必不能也占者聞言而信則轉凶而吉矣牽羊者當其前則不進縱之使前而隨其後則可以行矣象曰其行次且位不當也聞言不信聰不明也九五莧陸夬夬中行无咎莧閑辨反莧陸今馬齒莧感隂氣之多者九五當決之時為決之主而切近上六之隂如莧陸然若決而決之而又不為過暴合於中行則无咎矣戒占者當如是也象曰中行无咎中未光也程傳備矣傳曰卦辭言夬夬則於中行為无咎矣象復盡其義云中未光也夫人心正意誠乃能極中正之道而充實光輝五心有所比以義之不可而決之雖行於外不失中正之義可以无咎然於中道未得為光大也蓋人心一有所欲則離道矣夫子於此示人之意深矣上六无號終有凶隂柔小人居窮極之時黨類已盡无所號呼終必有凶也占者有君子之徳則其敵當之不然反是象曰无號之凶終不可長也巽下乾上姤女壯勿用取女姤古后反取七喻反姤遇也決盡則為純乾四月之卦至姤然後一陰可見而為五月之卦以其本非所望而卒然値之如不期而遇者故為遇遇已非正又一陰而遇五陽則女徳不貞而壮之甚也取以自配必害乎陽故其象占如此彖曰姤遇也柔遇剛也釋卦名勿用取女不可與長也釋卦辭天地相遇品物咸章也以卦體言剛遇中正天下大行也指九五姤之時義大矣哉幾微之際聖人所謹象曰天下有風姤后以施命誥四方初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅柅乃李反又女紀反柅所以止車以金為之其剛可知一隂始生靜正則吉往進則凶故以二義戒小人使不害於君子則有吉而无凶然其勢不可止也故以羸豕蹢躅曉君子使深為之備云象曰繫于金柅柔道牽也牽進也以其進故止之九二包有魚无咎不利賔魚陰物二與初遇為包有魚之象然制之在已故猶可以无咎若不制而使遇於衆則其為害廣矣故其象占如此象曰包有魚義不及賔也九三臀无膚其行次且厲无大咎九三過剛不中下不過於初上无應於上居則不安行則不進故其象占如此然既无所遇則无陰邪之傷故雖危厲而无大咎也象曰其行次且行未牽也九四包无魚起凶初六正應已遇於二而不及於已故其象占如此象曰无魚之凶逺民也逺袁萬反民之去已猶已逺之九五以杞包瓜含章有隕自天瓜隂物之在下者甘美而善潰杞高大堅實之木也五以陽剛中正主卦於上而下防始生必潰之陰其象如此然隂陽迭勝時運之常若能含晦章美靜以制之則可以囘造化矣有隕自天本无而倏有之象也象曰九五含章中正也有隕自天志不舍命也舍音捨上九姤其角吝无咎角剛乎上者也上九以剛居上而无位不得其遇故其象占與九三類象曰姤其角上窮吝也坤下兌上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往假更白反萃聚也坤順兌説九五剛中而二應之又為澤上於地萬物萃聚之象故為萃亨字衍文王假有廟言王者可以至于宗廟之中王者卜祭之吉占也祭義曰公假于太廟是也廟所以聚祖考之精神又人必能聚已之精神則可以至于廟而承祖考也物既聚則必見大人而後可以得亨然又必利於正所聚不正則亦不能亨也大牲必聚而後有聚則可以有所往皆占吉而有戒之辭彖曰萃聚也順以説剛中而應故聚也説音悦以卦徳卦體釋卦名義王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也釋卦辭觀其所聚而天地萬物之情可見矣極言其理而贊之象曰澤上於地萃君子以除戎器戒不虞上時掌反除者脩而聚之之謂初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎號平聲初六上應九四而隔於二隂當萃之時不能自守是有孚而不終志亂而妄聚也若呼號正應則衆以為笑但勿恤而往從正應則无咎矣戒占者當如是也象曰乃亂乃萃其志亂也六二引吉无咎孚乃利用禴禴羊畧反二應五而雜於二隂之間必牽引以萃乃吉而无咎又二中正柔順虛中以上應九五剛健中正誠實而下交故卜祭者有其孚誠則雖薄物亦可以祭矣象曰引吉无咎中未變也六三萃如嗟如无攸利往无咎小吝六三陰柔不中不正上无應與欲求萃於近而不得故嗟如而无所利唯往從於上可以无咎然不得其萃困然後往復得隂極无位之爻亦可小羞矣戒占者當近捨不正之强援而逺結正應之窮交則无咎也象曰往无咎上巽也九四大吉无咎上比九五下比衆隂得其萃矣然以陽居陰不正故戒占者必大吉然後得无咎也象曰大吉无咎位不當也九五萃有位无咎匪孚元永貞悔亡九五剛陽中正當萃之時而居尊固无咎矣若有未信則亦脩其元永貞之德而悔亡矣戒占者當如是也象曰萃有位志未光也未光謂匪孚上六齎咨涕洟无咎齎音咨又将啼反洟音夷象同處萃之終陰柔无位求萃不得故戒占者必如是而後可以无咎也象曰齎咨涕洟未安上也巽下坤上升元亨用見大人勿恤南征吉升進而上也卦自解來柔上居四内巽外順九二剛中而五應之是以其占如此南征前進也彖曰柔以時升以卦變釋卦名巽而順剛中而應是以大亨以卦徳卦體釋卦辭用見大人勿恤有慶也南征吉志行也象曰地中生木升君子以順徳積小以高大王肅本順作慎今按他書引此亦多作慎意尤明白蓋古字通用也説見上篇蒙卦初六允升大吉初以柔順居下巽之主也當升之時巽於二陽占者如之則信能升而大吉矣象曰允升大吉上合志也九二孚乃利用禴无咎義見萃卦象曰九二之孚有喜也九三升虛邑陽實隂虛而坤有國邑之象九三以陽剛當升時而進臨於坤故其象占如此象曰升虛邑无所疑也六四王用亨于岐山吉无咎義見隨卦象曰王用亨于岐山順事也以順而升登祭于山之象六五貞吉升階以陰居陽當升而居尊位必能正固則可以得吉而升階矣階升之易者象曰貞吉升階大得志也上六㝠升利于不息之貞以陰居升極昏㝠不已者也占者遇此无適而利但可反其不已於外之心施之於不息之正而已象曰㝠升在上消不富也坎下兌上困亨貞大人吉无咎有言不信困者窮而不能自振之義坎剛為兌柔所揜九二為二隂所揜四五為上六所揜所以為困坎險兌説處險而説是身雖困而道則亨也二五則中又有大人之象占者處困能亨則得其正矣非大人其孰能之故曰貞又曰大人者明不正之小人不能當也有言不信又戒以當務晦黙不可尚口益取困窮彖曰困剛揜也以卦體釋卦名險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也説音悦以卦徳卦體釋卦辭象曰澤无水困君子以致命遂志水下漏則澤上枯故曰澤无水致命猶言授命言持以與人而不之有也能如是則雖困而亨矣初六臀困于株木入于幽谷三嵗不覿臀物之底也困于株木傷而不能安也初六以隂柔處困之底居暗之甚故其象占如此象曰入于幽谷幽不明也九二困于酒食朱紱方來利用亨祀征凶无咎紱音弗亨讀作享困于酒食厭飫苦惱之意酒食人之所欲然醉飽過宜則是反為所困矣朱紱方来上應之也九二有剛中之徳以處困時雖无凶害而反困于得其所欲之多故其象如此而其占利以享祀若征行則非其時故凶而於義為无咎也象曰困于酒食中有慶也六三困于石據于蒺蔾入于其宫不見其妻凶陰柔而不中正故有此象而其占則凶石指四蒺蔾指二宫謂三而妻則六也其義則繫辭備矣象曰據于蒺蔾乘剛也入于其宫不見其妻不祥也九四來徐徐困于金車吝有終初六九四之正應九四處位不當不能濟物而初六方困于下又為九二所隔故其象如此然邪不勝正故其占雖為可吝而必有終也金車為九二象未詳疑坎有輪象也象曰來徐徐志在下也雖不當位有與也九五劓刖困于赤紱乃徐有説利用祭祀劓音見睽刖音月説音悦劓刖者傷於上下上下既傷則赤紱无所用而反為困矣九五當困之時上為陰揜下則乘剛故有此象然剛中而説體故能遲久而有説也占具象中又利用祭祀久當獲福象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也上六困于葛藟于臲卼曰動悔有悔征吉藟力軌反臲五結反卼五骨反以陰柔處困極故有困于葛藟于臲卼曰動悔之象然物窮則變故其占曰若能有悔則可以征而吉矣象曰困于葛藟未當也動悔有悔吉行也巽下坎上井改邑不改井无喪无得往來井井汔至亦未繘井羸其甁凶喪息浪反汔許訖反繘音橘羸律裴反井者穴地出水之處以巽木入乎坎水之下而上出其水故為井改邑不改井故无喪无得而往者來者皆井其井也汔幾也繘綆也羸敗也汲井幾至未盡綆而敗其瓶則凶也其占為事仍舊无得喪而又當敬勉不可幾成而敗也彖曰巽乎水而上水井井養而不窮也上時掌反以卦象釋卦名義改邑不改井乃以剛中也汔至亦未繘井未有功也羸其甁是以凶也以卦體釋卦辭无喪无得往来井井兩句意與不改井同故不復出剛中以二五而言未有功而敗其甁所以凶也象曰木上有水井君子以勞民勸相上如字又時掌反勞力報反相息亮反木上有水津潤上行井之象也勞民者以君養民勸相者使民相養皆取井養之意初六井泥不食舊井无禽泥乃計反井以陽剛為泉上出為功初六以隂居下故為此象蓋井不泉而泥則人所不食而禽鳥亦莫之顧也象曰井泥不食下也舊井无禽時舍也舍音捨言為時所棄九二井谷射鮒甕敝漏谷余六反音育射石亦反鮒音附九二剛中有泉之象然上无正應下比初六功不上行故其象如此象曰井谷射鮒无與也九三井渫不食為我心惻可用汲王明並受其福渫息列反渫不停汚也井渫不食而使人心惻可用汲矣王明則汲井以及物而施者受者並受其福也九三以陽居陽在下之上而未為時用故其象占如此象曰井渫不食行惻也求王明受福也行惻者行道之人皆以為惻也六四井甃无咎甃側救反以六居四雖得其正然陰柔不泉則但能脩治而无及物之功故其象為井甃而占則无咎占者能自脩治則雖无及物之功而亦可以无咎矣象曰井甃无咎脩井也九五井洌寒泉食洌音列洌潔也陽剛中正功及於物故為此象占者有其徳則契其象也象曰寒泉之食中正也上六井收勿幕有孚元吉收詩救反又如字幕音莫收汲取也晁氏云收鹿盧收繘者也亦通幕蔽覆也有孚謂其出有源而不窮也井以上出為功而坎口不揜故上六雖非陽剛而其象如此然占者應之必有孚乃元吉也象曰元吉在上大成也離下兌上革已日乃孚元亨利貞悔亡革變革也兌澤在上離火在下火然則水乾水決則火滅中少二女合為一卦而少上中下志不相得故其卦為革也變革之初人未之信故必已日而後信又以其内有文明之徳而外有和説之氣故其占為有所更革皆大亨而得其正所革皆當而所革之悔亡也一有不正則所革不信不通而反有悔矣彖曰革水火相息二女同居其志不相得曰革以卦象釋卦名義大畧與睽相似然以相違而為睽相息而為革也息滅息也又為生息之義滅息而後生息也已日乃孚革而信之文明以説大亨以正革而當其悔乃亡説音悦當去聲以卦徳釋卦辭天地革而四時成湯武革命順乎天而應乎人革之時大矣哉極言而贊其大也象曰澤中有火革君子以治厯明時治平聲四時之變革之大者初九鞏用黄牛之革鞏九勇反雖當革時居初无應未可有為故為此象鞏固也黄中色牛順物革所以固物亦取卦名而義不同也其占為當堅確固守而不可以有為聖人之於變革其謹如此象曰鞏用黄牛不可以有為也六二己日乃革之征吉无咎六二柔順中正而為文明之主有應於上於是可以革矣然必已日然後革之則征吉而无咎戒占者猶未可遽變也象曰已日革之行有嘉也九三征凶貞厲革言三就有孚過剛不中居離之極躁動於革者也故其占有征凶貞厲之戒然其時則當革故至於革言三就則亦有孚而可革也象曰革言三就又何之矣言已審九四悔亡有孚改命吉以陽居陰故有悔然卦已過中水火之際乃革之時而剛柔不偏又革之用也是以悔亡然又必有孚然後革乃可獲吉明占者有其徳而當其時又必有信乃悔亡而得吉也象曰改命之吉信志也九五大人虎變未占有孚虎大人之象變謂希革而毛毨也在大人則自新新民之極順天應人之時也九五以陽剛中正為革之主故有此象占而得此則有此應然亦必自其未占之時人已信其如此乃足以當之耳象曰大人虎變其文炳也上六君子豹變小人革面征凶居貞吉革道已成君子如豹之變小人亦革面以聴從矣不可以往而居正則吉變革之事非得已者不可以過而上六之才亦不可以有行也故占者如之象曰君子豹變其文蔚也小人革面順以從君也蔚紆胃反巽下離上鼎元吉亨鼎烹飪之器為卦下隂為足二三四陽為腹五陰為耳上陽為鉉有鼎之象又以巽木入離火而致烹飪鼎之用也故其卦為鼎下巽巽也上離為目而五為耳有内巽順而外聰明之象卦自巽来隂進居五而下應九二之陽故其占曰元亨吉衍文也彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢亨普庚反飪入甚反以卦體二象釋卦名義因極其大而言之享帝貴誠用犢而已養賢則饔飱牢禮當極其盛故曰大亨巽而耳目聰明柔進而上行得中而應乎剛是以元亨上時掌反以卦象卦變卦體釋卦辭象曰木上有火鼎君子以正位凝命鼎重器也故有正位凝命之意凝猶至道不凝之凝傳所謂協于上下以承天休者也初六鼎顛趾利出否得妾以其子无咎出尺遂反又如字否音鄙居鼎之下鼎趾之象也上應九四則顛矣然當卦初鼎未有實而舊有否惡之積焉因其顛而出之則為利矣得妾而因得其子亦猶是也此爻之象如此而其占无咎蓋因敗以為功因賤以致貴也象曰鼎顛趾未悖也利出否以從貴也鼎而顛趾悖道也而因可出否以從貴則未為悖也從貴謂應四亦為取新之意九二鼎有實我仇有疾不我能即吉仇音求以剛居中鼎有實之象也我仇謂初隂陽相求而非正則相陷於惡而為仇矣二能以剛中自守則初雖近不能以就之是以其象如此而其占為如是則吉也象曰鼎有實慎所之也我仇有疾終无尤也有實而不慎其所往則為仇所即而陷於惡矣九三鼎耳革其行塞雉膏不食方雨虧悔終吉行下孟反塞悉則反以陽居鼎腹之中本有美實者也然以過剛失中越五應上又居下之極為變革之時故為鼎耳方革而不可舉移雖承上卦文明之腴有雉膏之美而不得以為人之食然以陽居陽為得其正苟能自守則隂陽將和而失其悔矣占者如是則初雖不利而終得吉也象曰鼎耳革失其義也九四鼎折足覆公餗其形渥凶折之舌反覆方服反餗送六反渥乙角反晁氏曰形渥諸本作刑剭謂重刑也今從之九四居上任重者也而下應初六之隂則不勝其任矣故其象如此而其占凶也象曰覆公餗信如何也言失信也六五鼎黄耳金鉉利貞鉉𤣥典反五於象為耳而有中徳故云黄耳金堅剛之物鉉貫耳以舉鼎者也五虛中以應九二之堅剛故其象如此而其占則利在貞固而已或曰金鉉以上九而言更詳之象曰鼎黄耳中以為實也上九鼎玉鉉大吉无不利上於象為鉉而以陽居陰剛而能温故有玉鉉之象而其占為大吉无不利蓋有是徳則如其占也象曰玉鉉在上剛柔節也震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯虩許逆反啞烏客反喪息浪反匕必以反鬯勅亮反震動也一陽始生於二隂之下震而動也其象為雷其屬為長子震有亨道震来當震之来時也虩虩恐懼驚顧之貌震驚百里以雷言七所以舉鼎實鬯以秬黍酒和鬰金所以灌地降神者也不喪匕鬯以長子言也此卦之占為能恐懼則致福而不失其所主之重彖曰震亨震有亨道不待言也震來虩虩恐致福也笑言啞啞後有則也恐致福恐懼以致福也則法也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也程子以為邇也下脱不喪匕鬯四字今從之出謂繼世而主祭也或云出即鬯字之誤象曰洊雷震君子以恐懼脩省洊在薦反省悉井反初九震來虩虩後笑言啞啞吉成震之主處震之初故其占如此象曰震來虩虩恐致福也笑言啞啞後有則也六二震來厲億喪貝躋于九陵勿逐七日得躋子西反六二乘初九之剛故當震之来而危厲也億字未詳又當喪其貨貝而升於九陵之上然柔順中正足以自守故不求而自獲也此爻占具象中但九陵七日之象則未詳耳象曰震來厲乗剛也六三震蘇蘇震行无眚蘇蘇緩散自失之状以隂居陽當震時而居不正是以如此占者若因懼而能行以去其不正則可以无眚矣象曰震蘇蘇位不當也九四震遂泥泥乃計反以剛處柔不中不正陷於二隂之間不能自震也遂者无反之意泥滯溺也象曰震遂泥未光也六五震往來厲億无喪有事喪息浪反以六居五而處震時无時而不危也以其得中故无所喪而能有事也占者不失其中則雖危无喪矣象曰震往來厲危行也其事在中大无喪也上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言索桑落反矍俱縛反以隂柔處震極故為索索矍矍之象以是而行其凶必矣然能及其震未及其身之時恐懼脩省則可以无咎而亦不能免於婚媾之有言戒占者當如是也象曰震索索中未得也雖凶无咎畏鄰戒也中謂中心艮下艮上艮其背不獲其身行其庭不見其人无咎艮止也一陽止於二隂之上陽自下升極上而止也其象為山取坤地而隆其上之状亦止於極而不進之意也其占則必能止于背而不有其身行其庭而不見其人乃无咎也蓋身動物也唯背為止艮其背則止於所當止也止於所當止則不隨身而動矣是不有其身也如是則雖行於庭除有人之地而亦不見其人矣蓋艮其背而不獲其身者止而止也行其庭而不見其人者行而止也動靜各止其所而皆主夫靜焉所以得无咎也彖曰艮止也時止則止時行則行動靜不失其時其道光明此釋卦名艮之義則止也然行止各有其時故時止而止止也時行而行亦止也艮體篤實故又有光明之義大畜於艮亦以輝光言之艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也此釋卦辭易背為止以明背即止也背者止之所也以卦體言内外之卦隂陽敵應而不相與也不相與則内不見已外不見人而无咎矣晁氏云艮其止當依卦辭作背象曰兼山艮君子以思不出其位初六艮其趾无咎利永貞以隂柔居艮初為艮止之象占者如之則无咎而又以其隂柔故又戒其利永貞也象曰艮其趾未失正也六二艮其腓不拯其隨其心不快拯之凌反六二居中得正既止其腓矣三為限則腓所隨也而過剛不中以止乎上二雖中正而體柔弱不能往而拯之是以其心不快也此爻占在象中下爻放此象曰不拯其隨未退聴也三止乎上亦不肯退而聴乎二也九三艮其限列其夤厲熏心夤引真反限身上下之際即腰胯也夤膂也止于腓則不進而已九三以過則不中當限之處而艮其限則不得屈伸而上下判隔如列其夤矣危厲熏心不安之甚也象曰艮其限危熏心也六四艮其身无咎以隂居隂時止而止故為艮其身之象而占得无咎也象曰艮其身止諸躬也六五艮其輔言有序悔亡六五當輔之處故其象如此而其占悔亡也悔謂以隂居陽象曰艮其輔以中正也正字羨文叶韻可見上九敦艮吉以陽剛居止之極敦厚於止者也象曰敦艮之吉以厚終也艮下巽上漸女歸吉利貞漸漸進也為卦止於下而巽於上為不遽進之義有女歸之象焉乂自二至五位皆得正故其占為女歸吉而又戒以利貞也彖曰漸之進也女歸吉也之字疑衍或是漸字進得位往有功也進以正可以正邦也以卦變釋利貞之意蓋此卦之變自渙而來九進居三自旅而來九進居五皆為得位之正其位剛得中也以卦體言謂九五也止而巽動不窮也以卦徳言漸進之義象曰山上有木漸君子以居賢德善俗二者皆當以漸而進疑賢字衍或善下有脱字初六鴻漸于干小子厲有言无咎鴻之行有序而進有漸干水涯也始進於下未得所安而上復无應故其象如此而其占則為小子厲雖有言而於義則无咎也象曰小子之厲義无咎也六二鴻漸于磐飲食衎衎吉衎苦旦反磐大石也漸逺於水進於磐而益安矣衎衎和樂意六二柔順中正進以其漸而上有九五之應故其象如此而占則吉也象曰飲食衎衎不素飽也素飽如詩言素餐得之以道則不為徒飽而處之安矣九三鴻漸于陸夫征不復婦孕不育凶利禦寇復房六反鴻水鳥陸非所安也九三過剛不中而无應故其象如此而其占夫征則不復婦孕則不育凶莫甚焉然以其過剛也故利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也離力智反六四鴻漸于木或得其桷无咎桷音角鴻不木棲桷平柯也或得平柯則可以安矣六四乘則而順巽故其象如此占者如之則无咎也象曰或得其桷順以巽也九五鴻漸于陵婦三嵗不孕終莫之勝吉陵高阜也九五居尊六二正應在下而為三四所隔然終不能奪其正也故其象如此而占者如是則吉也象曰終莫之勝吉得所願也上九鴻漸于陸其羽可用為儀吉胡氏程氏皆云陸當作逵謂雲路也今以韻讀之良是儀羽旄旌纛之飾也上九至高出乎人位之外而其羽毛可用以為儀飾位雖極高而不為无用之象故其占為如是則吉也象曰其羽可用為儀吉不可亂也漸進愈髙而不為无用其志卓然豈可得而亂哉兌下震上歸妹征凶无攸利婦人謂嫁曰歸妹少女也兌以少女而從震之長男而其情又為以説而動皆非正也故卦為歸妹而卦之諸爻自二至五皆不得正三五又皆以柔乘剛故其占征凶而无所利也彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也釋卦名義也歸者女之終生育者人之始説以動所歸妹也説音悦又以卦徳言之征凶位不當也无攸利柔乘剛也又以卦體釋卦辭男女之交本皆正理唯若此卦則不得其正也象曰澤上有雷歸妹君子以永終知敝雷動澤隨歸妹之象君子觀其合之不正知其終之有敝也推之事物莫不皆然初九歸妹以娣破能履征吉娣音弟跛波我反初九居下而无正應故為娣象然陽剛在女子為賢正之徳但為娣之賤僅能承助其君而已故又為跛能履之象而其占則征吉也象曰歸妹以娣以恒也跛能履吉相承也恒謂有常久之徳九二眇能視利幽人之貞眇能視承上爻而言九二陽剛得中女之賢也上有正應而反隂柔不正乃女賢而配不良不能大成内助之功故為眇能視之象而其占則利幽人之貞也幽人亦抱道守正而不偶者也象曰利幽人之貞未變常也六三歸妹以須反歸以娣六三隂柔而不中正又為説之主女之不正人莫之取者也故為未得所適而反歸為娣之象或曰須女之賤者象曰歸妹以須未當也九四歸妹愆期遲歸有時九四以陽居上體而无正應賢女不輕從人而愆期以待所歸之象正與六三相反象曰愆期之志有待而行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉􅃑彌計反六五柔中居尊下應九二尚德而不貴飾故為帝女下嫁而服不盛之象然女徳之盛无以加此故又為月幾望之象而占者如之則吉也象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也以其有中徳之貴而行故不尚飾上六女承筐无實士刲羊无血无攸利刲苦圭反上六以隂柔居歸妹之終而无應約婚而不終者也故其象如此而於占為无所利也象曰上六无實承虛筐也離下震上豐亨王假之勿憂宜日中假更白反豐大也以明而動盛大之勢也故其占有亨道焉然王者至此盛極當衰則又有憂道焉聖人以為徒憂无益但能守常不至於過盛則可矣故戒以勿憂宜日中也彖曰豐大也明以動故豐以卦徳釋卦名義王假之尚大也勿憂宜日中宜照天下也釋卦辭日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎此又𤼵明卦辭外意言不可過中也象曰雷電皆至豐君子以折獄致刑折之舌反取其威照並行之象初九遇其配主雖旬无咎往有尚配主謂四旬均也謂皆陽也當豐之時明動相資故初九之遇九四雖皆陽剛而其占如此也象曰雖旬无咎過旬災也戒占者不可求勝其配亦爻辭外意六二豐其蔀日中見斗往得疑疾有孚𤼵若吉蔀音部六二居豐之時為離之主至明者也而上應六五之柔暗故為豐蔀見斗之象蔀障蔽也大其障蔽故日中而昏也往而從之則昏暗之主必反見疑唯在積其誠意以感𤼵之則吉戒占者宜如是也虛中有孚之象象曰有孚𤼵若信以𤼵志也九三豐其沛日中見沬折其右肱无咎沬昧同莫佩反折食列反沛一作斾謂旌幔也其蔽甚於蔀矣沬小星也三處明極而應上六雖不可用而非咎也故其象占如此象曰豐其沛不可大事也折其右肱終不可用也九四豐其蔀日中見斗遇其夷主吉象與六二同夷等夷也謂初九也其占為當豐而遇暗主下就同徳則吉也象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五來章有慶譽吉質雖柔暗若能來致天下之明則有慶譽而吉矣蓋因其柔暗而設此以開之占者能如是則如其占矣象曰六五之吉有慶也上六豐其屋蔀其家闚其户闃其无人三嵗不覿凶闃苦鶪反以隂柔居豐極處動終明極而反暗者也故為豐大其屋而反以自蔽之象无人不覿亦言障蔽之深其凶甚矣象曰豐其屋天際翔也闚其户闃其无人自藏也藏謂障蔽艮下離上旅小亨旅貞吉旅羇旅也山止於下火炎於上為去其所止而不處之象故為旅以六五得中於外而順乎上下之二陽艮止而離麗於明故其占可以小亨而能守其旅之貞則吉旅非常居若可苟者然道无不在故自有其正不可須叟離也彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也以卦體卦徳釋卦辭旅之時義大矣哉旅之時為難處象曰山上有火旅君子以明慎用刑而不畱獄慎刑如山不畱如火初六旅瑣瑣斯其所取災當旅之時以隂柔居下位故其象占如此象曰旅瑣瑣志窮災也六二旅即次懐其資得童僕貞即次則安懐資則裕得其童僕之貞信則无欺而有賴旅之最吉者也二有柔順中正之徳故其象占如此象曰得童僕貞終无尤也九三旅焚其次喪其童僕貞厲喪息浪反象同過剛不中居下之上故其象占如此喪其童僕則不止於失其心矣故貞字連下句為義象曰旅焚其次亦以傷矣以旅與下其義喪也以旅之時而與下之道如此義當喪也九四旅于處得其資斧我心不快以陽居隂處上之下用柔能下故其象占如此然非其正位又上无剛陽之與下唯隂柔之應故其心有所不快也象曰旅于處未得位也得其資斧心未快也六五射雉一矢亡終以譽命射石亦反雉文明之物離之象也六五柔順文明又得中道為離之主故得此爻者為射雉之象雖不无亡矢之費而所喪不多終有譽命也象曰終以譽命上逮也上逮言其譽命聞於上也上九鳥焚其巢旅人先笑後號咷喪牛于易凶喪易並去聲上九過剛處旅之上離之極驕而不順凶之道也故其象占如此象曰以旅在上其義焚也喪牛于易終莫之聞也巽下巽上巽小亨利有攸往利見大人巽入也一隂伏于二陽之下其性能巽以入也其象為風亦取入義隂為主故其占為小亨以隂從陽故又利有所徃然必知所從乃得其正故又曰利見大人也彖曰重巽以申命釋卦義也巽順而入必究乎下命令之象重巽故為申命也剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人以卦體釋卦辭剛巽乎中正而志行指九五柔謂初四象曰隨風巽君子以申命行事隨相繼之義初六進退利武人之貞初以隂居下為巽之主卑巽之過故為進退不果之象若以武人之貞處之則有以濟其所不及而得所宜矣象曰進退志疑也利武人之貞志治也九二巽在牀下用史巫紛若吉无咎二以陽處隂而居下有不安之意然當巽之時不厭其卑而二又居中不至已甚故其占為能過於巽而丁寧煩悉其辭以自道達則可以吉而无咎亦竭誠意以祭祀之吉占也象曰紛若之吉得中也九三頻巽吝過剛不中居下之上非能巽者勉為屢失吝之道也故其象占如此象曰頻巽之吝志窮也六四悔亡田獲三品隂柔无應承乗皆剛宜有悔也而以隂居隂處上之下故得悔亡而又為卜田之吉占也三品者一為乾豆一為賓客一以充庖象曰田獲三品有功也九五貞吉悔亡无不利无初有終先庚三日後庚三日吉先西薦反後胡豆反九五剛健中正而居巽體故有悔以有貞而吉也故得亡其悔而无不利有悔是无初也亡之是有終也庚更也事之變也先庚三日丁也後庚三日癸也丁所以丁寧於其變之前癸所以揆度於其變之後有所變更而得此占者如是則吉也象曰九五之吉位正中也上九巽在牀下喪其資斧貞凶喪息浪反下同巽在牀下過於巽者也喪其資斧失所以㫁也如是則雖貞亦凶矣居巽之極失其陽剛之徳故其象占如此象曰巽在牀下上窮也喪其資斧正乎凶也正乎凶言必凶兑下兑上兌亨利貞兌説也一隂進乎二陽之上喜之見乎外也其象為澤取其説萬物又取坎水而塞其下流之象卦體剛中而柔外剛中故説而亨柔外故利於貞蓋説有亨道而其妄説不可以不戒故其占如此又柔外故為説亨剛中故利於貞亦一義也彖曰兌説也説音悦下同釋卦名義剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉先西薦反又如字難乃旦反以卦體釋卦辭而極言之象曰麗澤兌君子以朋友講習兩澤相麗互相滋益朋友講習其象如此初九和兌吉以陽爻居説體而處最下又无係應故其象占如此象曰和兌之吉行未疑也居卦之初其説也正未有所疑也九二孚兌吉悔亡剛中為孚居隂為悔占者以孚而説則吉而悔亡矣象曰孚兌之吉信志也六三來兌凶隂柔不中正為兌之主上无所應而反來就二陽以求説凶之道也象曰來兌之凶位不當也九四商兌未寧介疾有喜四上承九五之中正而下比六三之柔邪故不能決而商度所説未能有定然質本陽剛故能介然守正而疾惡柔邪也如此則有喜矣象占如此為戒深矣象曰九四之喜有慶也九五孚于剝有厲剝謂隂能剝陽者也九五陽剛中正然當説之時而居尊位密近上六上六隂柔為説之主處説之極能妄説以剝陽者也故其占但戒以信于上六則有危也象曰孚于剝位正當也與履九五同上六引兌上六成説之主以隂居説之極引下二陽相與為説而不能必其從也故九五當戒而此爻不言其吉凶象曰上六引兌未光也坎下巽上渙亨王假有廟利涉大川利貞渙呼亂反假庚白反渙散也為卦下坎上巽風行水上離披解散之象故為渙其變則本自漸卦九来居二而得中六往居三得九之位而上同於四故其占可亨又以祖考之精神既散故王者當至於廟以聚之又以巽木坎水舟楫之象故利涉大川其曰利貞則占者之深戒也彖曰渙亨剛來而不窮柔得位乎外而上同上如字又時掌反以卦變釋卦辭王假有廟王乃在中也中謂廟中利涉大川乗木有功也象曰風行水上渙先王以亨于帝立廟皆所以合其散初六用拯馬壯吉居卦之初渙之始也始渙而拯之為力既易又有壮馬其吉可知初六非有濟渙之才但能順乎九二故其象占如此象曰初六之吉順也九二渙奔其机悔亡机音几九而居二宜有悔也然當渙之時來而不窮能亡其悔者也故其象占如此蓋九奔而二机也象曰渙奔其机得願也六三渙其躬无悔陰柔而不中正有私於已之象也然居得陽位志在濟時能散其私以得无悔故其占如此大率此上四爻皆因渙以濟渙者也象曰渙其躬志在外也六四渙其羣元吉渙有丘匪夷所思居隂得正上承九五當濟渙之任者也下无應與為能散其朋黨之象占者如是則大善而吉又言能散其小羣以成大羣使所散者聚而若丘則非常人思慮之所及也象曰渙其羣元吉光大也九五渙汗其大號渙王居无咎陽剛中正以居尊位當渙之時能散其號令與其居積則可以濟渙而无咎矣故其象占如此九五巽體有號令之象汗謂如汗之出而不反也渙王居如陸贄所謂散小儲而成大儲之意象曰王居无咎正位也上九渙其血去逖出无咎去起吕反上九以陽居渙極能出乎渙故其象占如此血謂傷害逖當作惕與小畜六四同言渙其血則去渙其惕則出也象曰渙其血逺害也逺袁萬反兌下坎上節亨苦節不可貞節有限而止也為卦下兌上坎澤上有水其容有限故為節節固自有亨道矣又其體隂陽各半而二五皆陽故其占得亨然至於太甚則苦矣故又戒以不可守以為貞也彖曰節亨剛柔分而剛得中以卦體釋卦辭苦節不可貞其道窮也又以理言説以行險當位以節中正以通説音悦又以卦徳卦體言之當位中正指五又坎為通天地節而四時成節以制度不傷財不害民極言節道象曰澤上有水節君子以制數度議徳行行下孟反初九不出户庭无咎户庭户外之庭也陽剛得正居節之初未可以行能節而止者也故其象占如此象曰不出户庭知通塞也塞悉則反九二不出門庭凶門庭門内之庭也九二當可行之時而失剛不正上无應與知節而不知通故其象占如此象曰不出門庭凶失時極也六三不節若則嗟若无咎隂柔而不中正以當節時非能節者故其象占如此象曰不節之嗟又誰咎也此无咎與諸爻異言无所歸咎也六四安節亨柔順得正上承九五自然有節者也故其象占如此象曰安節之亨承上道也九五甘節吉往有尚所謂當位以節中正以通者也故其象占如此象曰甘節之吉居位中也上六苦節貞凶悔亡居節之極故為苦節既處過極故雖得正而不免於凶然禮奢寧儉故雖有悔而終得亡之也象曰苦節貞凶其道窮也兌下巽上中孚豚魚吉利涉大川利貞孚信也為卦二隂在内四陽在外而二五之陽皆得其中以一卦言之為中虛以二體言之為中實皆孚信之象也又下説以應上上巽以順下亦為孚義豚魚无知之物又木在澤上外實内虛皆舟楫之象至信可感豚魚涉險難而不可以失其貞故占者能致豚魚之應則吉而利涉大川又必利於貞也彖曰中孚柔在内而剛得中説而巽孚乃化邦也説音悦以卦體卦徳釋卦名義豚魚吉信及豚魚也利涉大川乘木舟虛也以卦象言中孚以利貞乃應乎天也信而正則應乎天矣象曰澤上有風中孚君子以議獄緩死風感水受中孚之象議獄緩死中孚之意初九虞吉有他不燕他湯何反當中孚之初上應六四能度其可信而信之則吉復有他焉則失其所以度之之正而不得其所安矣戒占者之辭也象曰初九虞吉志未變也九二鳴鶴在隂其子和之我有好爵吾與爾靡之和胡卧反靡亡池反九二中孚之實而九五亦以中孚之實應之故有鶴鳴子和我爵爾靡之象鶴在隂謂九居二好爵謂得中靡與縻同言懿徳人之所好故好爵雖我之所獨有而彼亦係戀之也象曰其子和之中心願也六三得敵或鼓或罷或泣或歌敵謂上九信之窮者六三隂柔不中正以居説極而與之為應故不能自主而其象如此象曰或鼓或罷位不當也六四月幾望馬匹亡无咎幾音機望无方反六四居隂得正位近於君為月幾望之象馬匹謂初與已為匹四乃絶之而上以信於五故為馬匹亡之象占者如是則无咎也象曰馬匹亡絶類上也上上聲九五有孚攣如无咎攣力圓反九五剛健中正中孚之實而居尊位為孚之主者也下應九二與之同徳故其象占如此象曰有孚攣如位正當也上九翰音登于天貞凶居信之極而不知變雖得其貞亦凶道也故其象占如此雞曰翰音乃巽之象居巽之極為登于天雞非登天之物而欲登天信非所信而不知變亦猶是也象曰翰音登于天何可長也艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉小謂隂也為卦四隂在外二陽在内隂多於陽小者過也既過於陽可以亨矣然必利於守貞則又不可以不戒也卦之二五皆以柔而得中故可小事三四皆以剛失位而不中故不可大事卦體内實外虛如鳥之飛其聲下而不上故能致飛鳥遺音之應則宜下而大吉亦不可大事之類也彖曰小過小者過而亨也以卦體釋卦名義與其辭過以利貞與時行也柔得中是以小事吉也以二五言剛失位而不中是以不可大事也以三四言有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也以卦體言象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉山上有雷其聲小過三者之過皆小者之過可過於小而不可過於大可以小過而不可甚過彖所謂可小事而宜下者也初六飛鳥以凶初六隂柔上應九四又居過時上而不下者也飛鳥遺音不宜上宜下故其象占如此郭璞洞林占得此者或致羽蟲之孽象曰飛鳥以凶不可如何也六二過其祖遇其妣不及其君遇其臣无咎六二柔順中正進則過三四而遇六五是過陽而反遇隂也如此則不及六五而自得其分是不及君而適遇其臣也皆過而不過守正得中之意无咎之道也故其象占如此象曰不及其君臣不可過也所以不及君而還遇臣者以臣不可過故也九三弗過防之從或戕之凶戕在良反小過之時事每當過然後得中九三以剛居正衆隂所欲害者也而自恃其剛不肯過為之備故其象占如此故占者能過防之則可以免矣象曰從或戕之凶如何也九四无咎弗過遇之往厲必戒勿用永貞當過之時以剛處柔過乎恭矣无咎之道也弗過遇之言弗過於剛而適合其宜也往則過矣故有厲而當戒陽性堅剛故又戒以勿用永貞言當隨時之宜不可固守也或曰弗過遇之若以六二爻例則當如此説若依九三爻例則過遇當如過防之義未詳孰是當闕以俟知者象曰弗過遇之位不當也往厲必戒終不可長也爻義未明此亦當闕六五密雲不雨自我西郊公弋取彼在穴弋餘職反以隂居尊又當隂過之時不能有為而弋取六二以為助故有此象在穴隂物也兩陰相得其不能濟大事可知象曰密雲不雨已上也已上太髙也上六弗遇過之飛鳥離之凶是謂災眚眚生領反六以隂居動體之上處隂過之極過之已高而甚逺者也故其象占如此或曰遇過恐亦只當作過遇義同九四未知是否象曰弗遇過之已亢也離下坎上既濟亨小利貞初吉終亂既濟事之既成也為卦水火相交各得其用六爻之位各得其正故為既濟亨小當為小亨大抵此卦及六爻占辭皆有警戒之意時當然也彖曰既濟亨小者亨也濟下疑脱小字利貞剛柔正而位當也以卦體言初吉柔得中也指六二終止則亂其道窮也象曰水在火上既濟君子以思患而豫防之初九曳其輪濡其尾无咎曳以制反濡音如輪在下尾在後初之象也曳輪則車不前濡尾則狐不濟既濟之初謹戒如是无咎之道占者如是則无咎矣象曰曳其輪義无咎也六二婦喪其茀勿逐七日得喪息浪反茀力佛反二以文明中正之徳上應九五剛陽中正之君宜得行其志而九五居既濟之時不能下賢以行其道故二有婦喪其茀之象茀婦車之蔽言失其所以行也然中正之道不可終廢時過則行矣故又有勿逐而自得之戒象曰七日得以中道也九三高宗伐鬼方三年克之小人勿用既濟之時以剛居剛高宗伐鬼方之象也三年克之言其久而後克戒占者不可輕動之意小人勿用占法與師上六同象曰三年克之憊也憊蒲拜反六四繻有衣袽終日戒繻而朱反袽女居反既濟之時以柔居柔能預備而戒懼者也故其象如此程子曰繻當作濡衣袽所以塞舟之罅漏象曰終日戒有所疑也九五東鄰殺牛不如西鄰之禴祭實受其福東陽西隂言九五居尊而時已過不如六二之在下而始得時也又當文王與紂之事故其象占如此彖辭初吉終亂亦此意也象曰東鄰殺牛不如西鄰之時也實受其福吉大來也上六濡其首厲既濟之極險體之上而以隂柔處之為狐涉水而濡其首之象占者不戒危之道也象曰濡其首厲何可久也坎下離上未濟亨小狐汔濟濡其尾无攸利汔許訖反未濟事未成之時也水火不交不相為用卦之六爻皆失其位故為未濟汔幾也幾濟而濡尾猶未濟也占者如此向所利哉彖曰未濟亨柔得中也指六五言小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也象曰火在水上未濟君子以慎辨物居方水火異物各居其所故君子觀象而審辨之初六濡其尾吝以隂居下當未濟之初未能自進故其象占如此象曰濡其尾亦不知極也極字未詳考上下韻亦不叶或恐是敬字令且闕之九二曳其輪貞吉以九二應六五而居柔得中為能自止而不進得為下之正也故其象占如此象曰九二貞吉中以行正也九居二本非正以中故得正也六三未濟征凶利涉大川隂柔不中正居未濟之時以征則凶然以柔乘剛將出乎故有利涉之象故其占如此蓋行者可以水浮而不可以陸走也或疑利字上當有不字象曰未濟征凶位不當也九四貞吉悔亡震用伐鬼方三年有賞于大國以九居四不正而有悔也能勉而貞則悔亡矣然以不貞之資欲勉而貞非極其陽剛用力之久不能也故為伐鬼方三年而受賞之象象曰貞吉悔亡志行也六五貞吉无悔君子之光有孚吉以六居五亦非正也然文明之主居中應剛虛心以求下之助故得貞而吉且无悔又有光煇之盛信實而不妄吉而又吉也象曰君子之光其暉吉也暉者光之散也上九有孚于飲酒无咎濡其首有孚失是以剛明居未濟之極時将可以有為而自信自養以俟命无咎之道也若縱而不反如狐之涉水而濡其首則過於自信而失其義矣象曰飲酒濡首亦不知節也周易本義卷二
