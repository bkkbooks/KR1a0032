body:
  text: 周易本義卷一宋朱子撰周易上經周代名也易書名也其卦本伏羲所畫有交易變易之義故謂之易其辭則文王周公所繫故繫之周以其簡袠重大故分為上下兩篇經則伏羲之畫文王周公之辭也并孔子所作之傳十篇凡十二篇中間頗為諸儒所亂近世朝氏始正其失而未能盡合古文吕氏又更定著為經二卷傳十卷乃復孔氏之舊云乾下乾上乾元亨利貞乾渠焉反六畫者伏羲所畫之卦也一者奇也陽之數也乾者健也陽之性也本注乾字三畫卦之名也下者內卦也上者外卦也經文乾字六畫卦之名也伏羲仰觀俯察見隂陽有奇耦之數故畫一奇以象陽畫一耦以象隂見一隂一陽有各生一隂一陽之象故自下而上再倍而三以成八卦見陽之性健而其成形之大者為天故三奇之卦名之曰乾而擬之於天也三畫已具八卦已成則又三倍其畫以成六畫而於八卦之上各加八卦以成六十四卦也此卦六畫皆奇上下皆乾則陽之純而健之至也故乾之名天之象皆不易焉元亨利貞文王所繫之辭以斷一卦之吉凶所謂彖辭者也元大也亨通也利宜也貞正而固也文王以為乾道大通而至正故於筮得此卦而六爻皆不變者言其占當得大通而必利在正固然後可以保其終也此聖人所以作易教人卜筮而可以開物成務之精意餘卦放此初九潛龍勿用潛捷言反初九者卦下陽爻之名凡畫卦者自下而上故以下爻為初陽數九為老七為少老變而少不變故謂陽爻為九潛龍勿用周公所繫之辭以斷一爻之吉凶所謂爻辭者也潛藏也龍陽物也初陽在下未可施用故其象為潛龍其占曰勿用凡遇乾而此爻變者常觀此象而玩其占也餘爻放此九二見龍在田利見大人見龍之見賢遍反卦內見龍並同二謂自下而上第二爻也後放此九二剛健中正出潛離隱澤及於物物所利見故其象為見龍在田其占為利見大人九二雖未得位而大人之德已著常人不足以當之故值此爻之變者但為利見此人而已蓋亦謂在下之大人也此以爻與占者相為主賔自為一例若有見龍之德則為利見九五在上之大人矣九三君子終日乾乾夕惕若厲無咎九陽爻三陽位重剛不中居下之上乃危地也然性體剛健有能乾乾惕厲之象故其占如此君子指占者而言言能憂懼如是則雖處危地而無咎也九四或躍在淵無咎躍羊灼反或者疑而未定之辭躍者無所緣而絶於地特未飛爾淵者上空下洞深昧不測之所龍之在是若下於田或躍而起則向乎天矣九陽四隂居上之下改革之際進退未定之時也故其象如此其占能隨時進退則無咎也九五飛龍在天利見大人剛健中正以居尊位如以聖人之德居聖人之位故其象如此而占法與九二同特所利見者在上之大人爾若有其位則為利見九二在下之大人也上九亢龍有悔亢苦浪反上者最上一爻之名亢者過於上而不能下之意也陽極於上動必有悔故其象占如此用九見羣龍無首吉用九言凡筮得陽爻者皆用九而不用七蓋諸卦百九十二陽爻之通例也以此卦純陽而居首故於此發之而聖人因繫之辭使遇此卦而六爻皆變者即此占之蓋六陽皆變剛而能柔吉之道也故為羣龍無首之象而其占為如是則吉也春秋傳曰乾之坤曰見羣龍無首吉蓋即純坤卦辭牝馬之貞先迷後得東北喪朋之意彖曰大哉乾元萬物資始乃統天彖吐亂反彖即文王所繫之辭傳者孔子所以釋經之辭也後凡言傳者放此此専以天道明乾義又析元亨利貞為四德以發明之而此一節首釋元義也大哉歎辭元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天雲行雨施品物流形施始䜴反卦內同此釋乾之亨也大明終始六位時成時乘六龍以御天始即元也終謂貞也不終則無始不貞則無以為元也此言聖人大明乾道之終始則見卦之六位各以時成而乘此六陽以行天道是乃聖人之元亨也乾道變化各正性命保合太和乃利貞變者化之漸化者變之成物所受為性天所賦為命太和陰陽會合沖和之氣也各正者得於有生之初保合者全於己生之後此言乾道變化無所不利而萬物各得其性命以自全以釋利貞之義也首出庶物萬國咸寧聖人在上高出於物猶乾道之變化也萬國各得其所而咸寧猶萬物之各正性命而保合太和也此言聖人之利貞也蓋嘗統而論之元者物之始生亨者物之暢茂利則向於實也貞則實之成也實之既成則其根蒂脫落可復種而生矣此四德之所以循環而無端也然而四者之間生氣流行初無間斷此元之所以包四德而統天也其以聖人而言則孔子之意蓋以此卦為聖人得天位行天道而致太平之占也雖其文義有非文王之舊者然讀者各以其意求之則並行而不悖也坤卦放此象曰天行健君子以自彊不息象者卦之上下兩象及兩象之六爻周公所繫之辭也天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重復之象非至健不能也君子法之不以人欲害其天德之剛則自彊而不息矣潛龍勿用陽在下也陽謂九下謂潛見龍在田德施普也終日乾乾反復道也復芳服反本亦作覆反復重復踐行之意或躍在淵進無咎也可以進而不必進也飛龍在天大人造也造徂早反造猶作也亢龍有悔盈不可久也用九天德不可為首也言陽剛不可為物先故六陽皆變而吉天行以下先儒謂之大象潛龍以下先儒謂之小象後放此文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也長丁文反下長人同幹古旦反此篇申彖傳象傳之意以盡乾坤二卦之藴而餘卦之說因可以例推云元者生物之始天地之德莫先於此故於時為春於人則為仁而衆善之長也亨者生物之通物至於此莫不嘉美故於時為夏於人則為禮而衆美之會也利者生物之遂物各得宜不相妨害故於時為秋於人則為義而得其分之和貞者生物之成實理具備隨在各足故於時為冬於人則為智而為衆事之幹幹木之身而枝葉所依以立者也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事以仁為體則無一物不在所愛之中故足以長人嘉其所會則無不合禮使物各得其所利則義無不和貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹君子行此四德者故曰乾元亨利貞非君子之至健無以行此故曰乾元亨利貞此第一節申彖傳之意與春秋傳所載穆姜之言不異疑古者巳有此語穆姜稱之而夫子亦有取焉故下文别以子曰表孔子之辭蓋傳者欲以明此章之為古語也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也樂音洛確苦學反龍德聖人之德也在下故隱易謂變其所守大抵乾卦六爻文言皆以聖人明之有隱顯而無淺深也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也行下孟反邪以嗟反正中不潛而未躍之時也常言亦信常行亦謹盛德之至也間邪存其誠無斁亦保之意言君德也者釋大人之為九二也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣幾音機忠信主於心者無一念之不誠也修辭見於事者無一言之不實也雖有忠信之心然非修辭立誠則無以居之知至至之進德之事知終終之居業之事所以終日乾乾而夕猶惕若者以此故也可上可下不驕不憂所謂無咎也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎離去聲內卦以德學言外卦以時位言進德修業九三備矣此則欲其及時而進也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也應去聲作起也物猶人也覩釋利見之意也本乎天者謂動物本乎地者謂植物物各從其類聖人人類之首也故興起於上則人皆見之上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也賢人在下位謂九五以下無輔以上九過高志滿不來輔助之也此第二節申象傳之意潛龍勿用下也見龍在田時舍也舍音捨言未為時用也終日乾乾行事也或躍在淵自試也未遽有為姑試其可飛龍在天上治也治平聲居上以治下亢龍有悔窮之災也乾元用九天下治也治去聲言乾元用九見與他卦不同君道剛而能柔天下無不治矣此第三節再申前意潛龍勿用陽氣潛藏見龍在田天下文明雖不在上位然天下已被其化終日乾乾與時偕行時當然也或躍在淵乾道乃革離下而上變革之時飛龍在天乃位乎天德天德即天位也蓋唯有是德乃宜居是位故以名之亢龍有悔與時偕極乾元用九乃見天則剛而能柔天之法也此第四節又申前意乾元者始而亨者也始則必亨理勢然也利貞者性情也收斂歸藏乃見性情之實乾始能以美利利天下不言所利大矣哉始者元而亨也利天下者利也不言所利者貞也或曰坤利牝馬則言所利矣大哉乾乎剛健中正純粹精也剛以體言健兼用言中者其行無過不及正者其立不偏四者乾之德也純者不雜於隂柔粹者不雜於邪惡蓋剛健中正之至極而精者又純粹之至極也或疑乾剛無柔不得言中正者不然也天地之間本一氣之流行而有動靜爾以其流行之統體而言則但謂之乾而無所不包矣以其動靜分之然後有陰陽剛柔之别也六爻發揮旁通情也旁通猶言曲盡時乘六龍以御天也雲行雨施天下平也言聖人時乘六龍以御天則如天之雲行雨施而天下平也此第五節復申首章之意君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也行並去聲未見之見音現成德已成之德也初九固成德但其行未可見爾君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也蓋由四者以成大人之德再言君德以深明九二之為大人也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣重平聲下同重剛謂陽爻陽位九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎九四非重剛重字疑衍在人謂三或者隨時而未定也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎夫音扶先後並去聲大人即釋爻辭所利見之大人也有是德而當其位乃可以當之人與天地鬼神本無二理特蔽於有我之私是以梏於形體而不能相通大人無私以道為體曽何彼此先後之可言哉先天不違謂意之所為默與道契後天奉天謂知理如是奉而行之回紇謂郭子儀曰卜者言此行當見一大人而還其占蓋與此合若子儀者雖未及乎夫子之所論然其至公無我亦可謂當時之大人矣亢之為言也知進而不知退知存而不知亡知得而不知喪喪去聲所以動而有悔也其唯聖人乎知進退存亡而不失其正者其唯聖人乎知其理勢如是而處之以道則不至於有悔矣固非計私以避害者也再言其唯聖人乎始若設問而卒自應之也此第六節復申第二第三第四節之意坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉牝頻忍反喪去聲􅄲者耦也隂之數也坤者順也隂之性也注中者三畫卦之名也經中者六畫卦之名也隂之成形莫大於地此卦三畫皆耦故名坤而象地重之又得坤焉則是隂之純順之至故其名與象皆不易也牝馬順而健行者陽先隂後陽主義隂主利西南隂方東北陽方安順之為也貞健之守也遇此卦者其占為大亨而利以順健為正如有所往則先迷後得而主於利往西南則得朋往東北則喪朋大抵能安於正則吉也彖曰至哉坤元萬物資生乃順承天此以地道明坤之義而首言元也至極也比大義差緩始者氣之始生者形之始順承天施地之道也坤厚載物德合無疆含𢎞光大品物咸亨疆居良反下同言亨也德合無疆謂配乾也牝馬地類行地無疆柔順利貞君子攸行言利貞也馬乾之象而以為地類者牝隂物而馬又行地之物也行地無疆則順而健矣柔順利貞坤之德也君子攸行人之所行如坤之德也所行如是則其占如下文所云也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶陽大隂小陽得兼隂隂不得兼陽故坤之德常減於乾之半也東北雖喪朋然反之西南則終有慶矣安貞之吉應地無疆安而且貞地之德也象曰地勢坤君子以厚德載物地坤之象亦一而已故不言重而言其勢之順則見其高下相因之無窮至順極厚而無所不載也初六履霜堅冰至六隂爻之名隂數六老而八少故謂隂爻為六也霜隂氣所結盛則水凍而為冰此爻隂始生於下其端甚微而其勢必盛故其象如履霜則知堅冰之將至也夫陰陽者造化之本不能相無而消長有常亦非人所能損益也然陽主生隂主殺則其類有淑慝之分焉故聖人作易於其不能相無者既以健順仁義之屬明之而無所偏主至其消長之際淑慝之分則未嘗不致其扶陽抑隂之意焉蓋所以贊化育而參天地者其㫖深矣不言其占者謹微之意已可見於象中矣象曰履霜堅冰隂始凝也馴致其道至堅冰也凝魚陵反馴似遵反按魏志作初六履霜今當從之馴順習也六二直方大不習無不利柔順正固坤之直也賦形有定坤之方也德合無疆坤之大也六二柔順而中正又得坤道之純者故其德內直外方而又盛大不待學習而無不利占者有其德則其占如是也象曰六二之動直以方也不習無不利地道光也六三含章可貞或從王事無成有終六隂三陽內含章美可貞以守然居下之上不終含藏故或時出而從上之事則始雖無成而後必有終爻有此象故戒占者有此德則如此占也象曰含章可貞以時發也或從王事知光大也知音智六四括囊無咎無譽括古活反譽音餘又音預括囊言結囊口而不出也譽者過實之名謹密如是則無咎而亦無譽矣六四重隂不中故其象占如此蓋或事當謹密或時當隱遁也象曰括囊無咎慎不害也六五黃裳元吉黃中色裳下飾六五以隂居尊中順之德充諸內而見於外故其象如此而其占為大善之吉也占者德必如是則其占亦如是矣春秋傳南蒯將叛筮得此爻以為大吉子服惠伯曰忠信之事則可不然必敗外彊內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極且夫易不可以占險三者有闕筮雖當未也後蒯果敗此可以見占法矣象曰黃裳元吉文在中也文在中而見於外也上六龍戰于野其血𤣥黃隂盛之極至與陽爭兩敗俱傷其象如此占者如是其凶可知象曰龍戰于野其道窮也用六利永貞用六言凡筮得隂爻者皆用六而不用八亦通例也以此卦純隂而居首故發之遇此卦而六爻俱變者其占如此辭蓋隂柔而不能固守變而為陽則能永貞矣故戒占者以利永貞即乾之利貞也自坤而變故不足於元亨云象曰用六永貞以大終也初隂後陽故曰大終文言曰坤至柔而動也剛至靜而德方剛方釋牝馬之貞也方謂生物有常後得主而有常程傳曰主下當有利字含萬物而化光復明亨義坤道其順乎承天而時行復明順承天之義此以上申彖傳之意積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也古字順慎通用按此當作慎言當辨之於微也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也此以學而言之也正謂本體義謂裁制敬則本體之守也直內方外程傳備矣不孤言大也疑故習而後利不疑則何假於習傳曰直言其正也方言其義也君子主敬以直其內守義以方其外敬立而內直義形而外方義形於外非在外也敬義既立其德盛矣不期大而大矣德不孤也無所用而不周無所施而不利孰為疑乎隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也君子黃中通理黃中言中德在內釋黃字之義也正位居體雖在尊位而居下體釋裳字之義也美在其中而暢於四支發於事業美之至也美在其中復釋黃中暢於四支復釋居體隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃為于僞反離力智反夫音扶疑謂鈞敵而無小大之差也坤雖無陽然陽未嘗無也血隂屬蓋氣陽而血隂也𤣥黃天地之正色言隂陽皆傷也此以上申象傳之意震下坎上屯元亨利貞勿用有攸往利建侯屯張倫反震坎皆三畫卦之名震一陽動於二隂之下故其德為動其象為雷坎一陽陷於二隂之間故其德為陷為險其象為雲為雨為水屯六畫卦之名也難也物始生而未通之意故其為字象屮穿地始出而未申也其卦以震遇坎乾坤始交而遇險陷故其名為屯震動在下坎險在上是能動乎險中能動雖可以亨而在險則宜守正而未可遽進故筮得之者其占為大亨而利於正但未可遽有所往耳又初九陽居隂下而為成卦之主是能以賢下人得民而可君之象故筮立君者遇之則吉也彖曰屯剛柔始交而難生難去聲六二象同以二體釋卦名義始交謂震難生謂坎動乎險中大亨貞以二體之德釋卦辭動震之為也險坎之地也自此以下釋元亨利貞乃用文王本意雷雨之動滿盈天造草昧宜建侯而不寧以二體之象釋卦辭雷震象雨坎象天造猶言天運草雜亂昧晦冥也隂陽交而雷雨作雜亂晦冥塞乎兩間天下未定名分未明宜立君以統治而未可遽謂安寧之時也不取初九爻義者取義多端姑舉其一也象曰雲雷屯君子以經綸坎不言水而言雲者未通之意經綸治絲之事經引之綸理之也屯難之世君子有為之時也初九磐桓利居貞利建侯磐步干反磐桓難進之貌屯難之初以陽在下又居動體而上應隂柔險陷之爻故有磐桓之象然居得其正故其占利於居貞又本成卦之主以陽下隂為民所歸侯之象也故其象又如此而占者如是則利建以為侯也象曰雖磐桓志行正也以貴下賤大得民也下遐嫁反六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字邅張連反乘繩澄反又音繩班分布不進之貌字許嫁也禮曰女子許嫁笄而字六二隂柔中正有應於上而乘初剛故為所難而邅回不進然初非為寇也乃求與已為婚媾耳但已守正故不之許至於十年數窮理極則妄求者去正應者合而可許矣爻有此象故因以戒占者象曰六二之難乘剛也十年乃字反常也六三即鹿無虞惟入于林中君子幾不如舍往吝幾音機舍音捨象同隂柔居下不中不正上無正應妄行取困為逐鹿無虞陷入林中之象君子見幾不如舍去若往逐而不舍必致羞吝戒占者宜如是也象曰即鹿無虞以從禽也君子舍之往吝窮也六四乘馬班如求婚媾往吉無不利隂柔居屯不能上進故為乘馬班如之象然初九守正居下以應於已故其占為下求婚媾則吉也象曰求而往明也九五屯其膏小貞吉大貞凶九五雖以陽剛中正居尊位然當屯之時陷於險中雖有六二正應而隂柔才弱不足以濟初九得民於下衆皆歸之九五坎體有膏潤而不得施為屯其膏之象占者以處小事則守正猶可獲吉以處大事則雖正而不免於凶象曰屯其膏施未光也施始䜴反上六乘馬班如泣血漣如隂柔無應處屯之終進無所之憂懼而已故其象如此象曰泣血漣如何可長也長直良反坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞告音谷三息暫反瀆音獨艮亦三畫卦之名一陽止於二隂之上故其德為止其象為山蒙昧也物生之初蒙昧未明也其卦以坎遇艮山下有險蒙之地也內險外止䝉之意也故其名為䝉亨以下占辭也九二內卦之主以剛居中能發人之䝉者而與六五隂陽相應故遇此卦者有亨道也我二也童䝉幼稚而䝉昧謂五也筮者明則人當求我而其亨在人筮者暗則我當求人而亨在我人求我者當視其可否而應之我求人者當致其精一而扣之而明者之養䝉與䝉者之自養又皆利於以正也彖曰䝉山下有險險而止䝉以卦象卦德釋卦名有兩義䝉亨以亨行時中也匪我求童䝉童䝉求我志應也初筮告以剛中也再三瀆瀆則不告瀆䝉也䝉以養正聖功也以卦體釋卦辭也九二以可亨之道發人之䝉而又得其時之中謂如下文所指之事皆以亨行而當其可也志應者二剛明五柔暗故二不求五而五求二其志自相應也以剛中者以剛而中故能告而有節也瀆筮者二三則問者固瀆而告者亦瀆矣䝉以養正乃作聖之功所以釋利貞之義也象曰山下出泉䝉君子以果行育德行下孟反六三象同泉水之始出者必行而有漸也初六發䝉利用刑人用說桎梏以往吝說吐活反桎音質梏古毒反以隂居下䝉之甚也占者遇此當發其䝉然發之之道當痛懲而暫舍之以觀其後若遂往而不舍則致羞吝矣戒占者當如是也象曰利用刑人以正法也發䝉之初法不可不正懲戒所以正法也九二包䝉吉納婦吉子克家九二以陽剛為內卦之主統治羣隂當發䝉之任者然所治既廣物性不齊不可一概取必而爻之德剛而不過為能有所包容之象又以陽受隂為納婦之象又居下位而能任上事為子克家之象故占者有其德而當其事則如是而吉也象曰子克家剛柔接也指二五之應六三勿用取女見金夫不有躬無攸利取七具反六三隂柔不中不正女之見金夫而不能有其身之象也占者遇之則其取女必得如是之人無所利矣金夫蓋以金賂已而挑之若魯秋胡之為者象曰勿用取女行不順也順當作慎蓋順慎古字通用荀子順墨作慎墨且行不慎於經意尤親切今當從之六四困䝉吝既逺於陽又無正應為困於䝉之象占者如是可羞吝也能求剛明之德而親近之則可免矣象曰困䝉之吝獨逺實也逺于萬反實叶韻去聲六五童䝉吉柔中居尊下應九二純一未發以聽於人故其象為童䝉而其占為如是則吉也象曰童䝉之吉順以巽也上九擊䝉不利為寇利禦寇以剛居上治䝉過剛故為擊䝉之象然取必太過攻治太深則必反為之害惟捍其外誘以全其真純則雖過於嚴密乃為得宜故戒占者如此凡事皆然不止為誨人也象曰利用禦寇上下順也禦寇以剛上下皆得其道乾下坎上需有孚光亨貞吉利涉大川需待也以乾遇坎乾健坎險以剛遇險而不遽進以陷於險待之義也孚信之在中者也其卦九五以坎體中實陽剛中正而居尊位為有孚得正之象坎水在前乾健臨之將涉水而不輕進之象故占者為有所待而能有信則光亨矣若又得正則吉而利涉大川正固無所不利而涉川尤貴於能待則不欲速而犯難也彖曰需須也險在前也剛健而不陷其義不困窮矣此以卦德釋卦名義需有孚光亨貞吉位乎天位以正中也利涉大川往有功也以卦體及兩象釋卦辭象曰雲上於天需君子以飲食宴樂上上聲樂音洛雲上於天無所復為待其隂陽之和而自雨爾事之當需者亦不容更有所為但飲食宴樂俟其自至而已一有所為則非需也初九需于郊利用恆無咎郊曠逺之地未近於險之象也而初九陽剛又有能恆於其所之象故戒占者能如是則無咎也象曰需于郊不犯難行也利用恆無咎未失常也難去聲九二需于沙小有言終吉沙則近於險矣言語之傷亦災害之小者漸進近坎故有此象剛中能需故得終吉戒占者當如是也象曰需于沙衍在中也雖小有言以吉終也衍以善反衍寬意以寬居中不急進也九三需于泥致寇至泥將陷於險矣寇則害之大者九三去險愈近而過剛不中故其象如此象曰需于泥災在外也自我致冦敬慎不敗也外謂外卦敬慎不敗發明占外之占聖人示人之意切矣六四需于血出自穴血者殺傷之地穴者險陷之所四交坎體入乎險矣故為需于血之象然柔得其正需而不進故又為出自穴之象占者如是則雖在傷地而終得出也象曰需于血順以聽也九五需于酒食貞吉酒食宴樂之其言安以待之九五陽剛中正需于尊位故有此象占者如是而貞固則得吉也象曰酒食貞吉以中正也上六入于穴有不速之客三人來敬之終吉隂居險極無復有需有陷而入穴之象下應九三九三與下二陽需極並進為不速客三人之象柔不能禦而能順之有敬之之象占者當陷險中然於非意之來敬以待之則得終吉也象曰不速之客來敬之終吉雖不當位未大失也當都浪反後凡言當位不當位者倣此以隂居上是為當位言不當位未詳坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川窒張栗反訟爭辨也上乾下坎乾剛坎險上剛以制其下下險以伺其上又為內險而外健又為已險而彼健皆訟之道也九二中實上無應與又為加憂且於卦變自遁而來為剛來居二而當下卦之中有有孚而見窒能懼而得中之象上九過剛居訟之極有終極其訟之象九五剛健中正以居尊位有大人之象以剛乘險以實履陷有不利涉大川之象故戒占者必有爭辨之事而隨其所處為吉凶也彖曰訟上剛下險險而健訟以卦德釋卦名義訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也以卦變卦體卦象釋卦辭象曰天與水違行訟君子以作事謀始天上水下其行相違作事謀始訟端絶矣初六不永所事小有言終吉隂柔居下不能終訟故其象占如此象曰不永所事訟不可長也雖小有言其辨明也九二不克訟歸而逋其邑人三百户無眚逋補吳反眚生領反九二陽剛為險之主本欲訟者也然以剛居柔得下之中而上應九五陽剛居尊勢不可敵故其象占如此邑人三百户邑之小者言自處卑約以免災患占者如是則無眚矣象曰不克訟歸逋竄也自下訟上患至掇也竄七亂反掇都活反掇自取也六三食舊德貞厲終吉或從王事無成食猶食邑之食言所享也六三隂柔非能訟者故守舊居正則雖危而終吉然或出而從上之事則亦必無成功占者守常而不出則善也象曰食舊德從上吉也從上吉謂隨人則吉明自主事則無成功也九四不克訟復即命渝安貞吉渝以朱反即就也命正理也渝變也九四剛而不中故有訟象以其居柔故又為不克而復就正理渝變其心安處於正之象占者如是則吉也象曰復即命渝安貞不失也九五訟元吉陽剛中正以居尊位聽訟而得其平者也占者遇之訟而有理必獲伸矣象曰訟元吉以中正也中則聽不偏正則斷合理上九或錫之鞶帶終朝三褫之褫敕紙反鞶帶命服之飾褫奪也以剛居訟極終訟而能勝之故有錫命受服之象然以訟得之豈能安久故又有終朝三褫之象其占為終訟無理而或取勝然其所得終必失之聖人為戒之意深矣象曰以訟受服亦不足敬也坎下坤上師貞丈人吉無咎師兵衆也下坎上坤坎險坤順坎水坤地古者寓兵於農伏至險於大順藏不測於至靜之中又卦唯九二一陽居下卦之中為將之象上下五隂順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象故其卦之名曰師丈人長老之稱用師之道利於得正而任老成之人乃得吉而無咎戒占者亦必如是也彖曰師衆也貞正也能以衆正可以王矣王往況反此以卦體釋師貞之義以謂能左右之也􅄲陽在下之中而五隂皆為所以也能以衆正則王者之師矣剛中而應行險而順以此毒天下而民從之吉又何咎矣又以卦體卦德釋丈人吉無咎之義剛中謂九二應謂六五應之行險謂行危道順謂順人心此非有老成之德者不能也毒害也師旅之興不無害於天下然以其有是才德是以民恱而從之也象曰地中有水師君子以容民畜衆畜許六反能水不外於地兵不外於民故養民則可以得衆矣初六師出以律否臧凶律法也否臧謂不善也朝氏曰否字先儒多作不是也在卦之初為師之始出師之道當謹其始以律則吉不臧則凶戒占者當謹始而守法也象曰師出以律失律凶也九二在師中吉無咎王三錫命九二在下為衆隂所歸而有剛中之德上應於五而為所寵任故其象占如此象曰在師中吉承天寵也王三錫命懷萬邦也六三師或輿尸凶輿尸謂師徒撓敗輿尸而歸也以隂居陽才弱志剛不中不正而犯非其分故其象占如此象曰師或輿尸大無功也六四師左次無咎左次謂退舍也隂柔不中而居隂得正故其象如此全師以退賢於六三逺矣故其占如此象曰左次無咎未失常也知難而退師之常也六五田有禽利執言無咎長子帥師弟子輿尸貞凶長之丈反六五用師之主柔順而中不為兵端者也敵加於己不得已而應之故為田有禽之象而其占利以搏執而無咎也言語辭也長子九二也弟子三四也又戒占者專於委任若使君子任事而又使小人參之則是使之輿尸而歸故雖貞而亦不免於凶也象曰長子帥師以中行也弟子輿尸使不當也當去聲上六大君有命開國承家小人勿用師之終順之極論功行賞之時也坤為土故有開國承家之象然小人則雖有功亦不可使之得有爵土但優以金帛可也戒行賞之人於小人則不可用此占而小人遇之亦不得用此爻也象曰大君有命以正功也小人勿用必亂邦也聖人之戒深矣坤下坎上比吉原筮元永貞無咎不寧方來後夫凶比毗意反九比親輔也五以陽剛居上之中而得其正上下五隂比而從之以一人而撫萬邦以四海而仰一人之象故筮者得之則當為人所親輔然必再筮以自審有元善長永正固之德然後可以當衆之歸而無咎其未比而有所不安者亦將皆來歸之若又遲而後至則此交已固彼來已晚而得凶矣若欲比人則亦以是而反觀之耳彖曰比吉也此三字疑衍文比輔也下順從也此以卦體釋卦名義原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也亦以卦體釋卦辭剛中謂五上下謂五隂象曰地上有水比先王以建萬國親諸侯地上有水水比於地不容有間建國親侯亦先王所以比於天下而無間者也彖意人來比我此取我往比人初六有孚比之無咎有孚盈缶終來有他吉缶俯九反他湯何反比之初貴乎有信則可以無咎矣若其充實則又有他吉也象曰比之初六有他吉也六二比之自內貞吉柔順中正上應九五自內比外而得其貞吉之道也占者如是則正而吉矣象曰比之自內不自失也得正則不自失矣六三比之匪人隂柔不中正承乘應皆隂所比皆非其人之象其占大凶不言可知象曰比之匪人不亦傷乎六四外比之貞吉以柔居柔外比九五為得其正吉之道也占者如是則正而吉矣象曰外比於賢以從上也九五顯比王用三驅失前禽邑人不誡吉一陽居尊剛健中正卦之羣隂皆來比已顯其比而無私如天子不合圍開􅄲面之網來者不拒去者不追故為用三驅失前禽而邑人不誡之象蓋雖私屬亦喻上意不相警備以求必得也凡此皆吉之道占者如是則吉也象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也舍音捨由上之德使不偏也上六比之無首凶隂柔居上無以比下凶之道也故為無首之象而其占則凶也象曰比之無首無所終也以上下之象言之則為無首以終始之象言之則為無終無首則無終矣乾下巽上小畜亨密雲不雨自我西郊畜敕六反大畜卦同巽亦三畫卦之名一隂伏於二陽之下故其德為巽為入其象為風為木小隂也畜止之之義也上巽下乾以隂畜陽又卦唯六四一隂上下五陽皆為所畜故為小畜又以隂畜陽能係而不能固亦為所畜者小之象內健外巽二五皆陽各居一卦之中而用事有剛而能中其志得行之象故其占當得亨通然畜未極而施未行故有密雲不雨自我西郊之象蓋密雲隂物西郊隂方我者文王自我也文王演易於羑里視岐周為西方正小畜之時也筮者得之則占亦如其象云彖曰小畜柔得位而上下應之曰小畜以卦體釋卦名義柔得位指六居四上下謂五陽健而巽剛中而志行乃亨以卦德卦體而言陽猶可亨也密雲不雨尚往也自我西郊施未行也施始䜴反尚往言畜之未極其氣猶上進也象曰風行天上小畜君子以懿文德風有氣而無質能畜而不能久故為小畜之象懿文德言未能厚積而逺施也初九復自道何其咎吉復芳六反二爻同下卦乾體本皆在上之物志欲上進而為隂所畜然初九體乾居下得正前逺於隂雖與四為正應而能自守以正不為所畜故有進復自道之象占者如是則無咎而吉也象曰復自道其義吉也九二牽復吉三陽志同而九二漸近於隂以其剛中故能與初九牽連而復亦吉道也占者如是則吉矣象曰牽復在中亦不自失也亦者承上爻義九三輿說輻夫妻反目說吐活反九三亦欲上進然剛而不中迫近於隂而又非正應但以隂陽相說而為所係畜不能自進故有輿說輻之象然以志剛故又不能平而與之爭故又為夫妻反目之象戒占者如是則不得進而有所爭也象曰夫妻反目不能正室也程子曰說輻反目三自為也六四有孚血去惕出無咎去上聲以一隂畜衆陽本有傷害憂懼以其柔順得正虛中巽體二陽助之是有孚而血去惕出之象也無咎宜矣故戒占者亦有其德則無咎也象曰有孚惕出上合志也九五有孚攣如富以其鄰攣力専反巽體三爻同力畜乾鄰之象也而九五居中處尊勢能有為以兼乎上下故為有孚攣固用富厚之力而以其鄰之象以猶春秋以某師之以言能左右之也占者有孚則能如是也象曰有孚攣如不獨富也上九既雨既處尚德載婦貞厲月幾望君子征凶幾音機歸妹卦同畜極而成隂陽和矣故為既雨既處之象蓋尊尚隂德至於積滿而然也隂加於陽故雖正亦厲然隂既盛而抗陽則君子亦不可以有行矣其占如此為戒深矣象曰既雨既處德積載也君子征凶有所疑也兌下乾上履虎尾不嘻人亨嘻直結反兌亦三畫卦之名一隂見於二陽之上故其德為說其象為澤履有所躡而進之義也以兌遇乾和說以躡剛强之後有履虎尾而不見傷之象故其卦為履而占如是也人能如是則處危而不傷矣彖曰履柔履剛也以二體釋卦名義說而應乎乾是以履虎尾不嘻人亨說音悅以卦德釋彖辭剛中正履帝位而不疚光明也又以卦體明之指九五也象曰上天下澤履君子以辨上下定民志程傳備矣傳曰天在上澤居下上下之正理也人之所履當如是故取其象而為履君子觀履之象以辨别上下之分以定其民志夫上下之分明然後民志有定民志定然後可以言治民志不定天下不可得而治也古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之皆非有預於己也農工商賈勤其事而所享有限故皆有定志而天下之心可一後世自庶士至於公卿日志於尊榮農工商賈日志於富侈億兆之心交騖於利天下紛然如之何其可一也欲其不亂難矣此由上下無定志也君子觀履之象而分辨上下使各當其分以定民之心志也初九素履往無咎以陽在下居履之初未為物遷率其素履者也占者如是則往而無咎也象曰素履之往獨行願也九二履道坦坦幽人貞吉剛中在下無應於上故為履道平坦幽獨守貞之象幽人履道而遇其占則貞而吉矣象曰幽人貞吉中不自亂也六三眇能視跛能履履虎尾嘻人凶武人為于大君跛波我反六三不中不正柔而志剛以此履乾必見傷害故其象如此而占者凶又為剛武之人得志而肆暴之象如秦政項籍豈能久也象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也九四履虎尾訴訴終吉訴山革反音色九四亦以不中不正履九五之剛然以剛居柔故能戒懼而得終吉象曰訴訴終吉志行也九五夬履貞厲夬古快反九五以剛中正履帝位而下以兌說應之凡事必行無所疑礙故其象為夫決其履雖使得正亦危道也故其占為雖正而危為戒深矣象曰夬履貞厲位正當也傷於所恃上九視履考祥其旋元吉視履之終以考其祥周旋無虧則得元吉占者禍福視其所履而未定也象曰元吉在上大有慶也若得元吉則大有福慶也乾下坤上泰小往大來吉亨泰通也為卦天地交而二氣通故為泰正月之卦也小謂隂大謂陽言坤往居外乾來居內又自歸妹來則六往居四九來居三也占者有陽剛之德則吉而亨矣彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也長丁丈反否卦同象曰天地交泰后以財成天地之道輔相天地之宜以左右民財裁同相息亮反左音佐右音佑財成以制其過輔相以補其不及初九拔茅茹以其彚征吉茹人余反彚于位反音胃否卦同三陽在下相連而進拔茅連茹之象征行之吉也占者陽剛則其征吉矣郭璞洞林讀至彚字絶句下卦放此象曰拔茅征吉志在外也九二包荒用馮河不遐遺朋亡得尚于中行馮音憑九二以剛居柔在下之中上有六五之應主乎泰而得中道者也占者能包容荒穢而果斷剛決不遺遐逺而不昵朋比則合乎此爻中行之道矣象曰包荒得尚于中行以光大也九三無平不陂無往不復艱貞無咎勿恤其孚于食有福將過於中泰將極而否欲來之時也恤憂也孚所期之信也戒占者艱難守貞則無咎而有福象曰無往不復天地際也六四翩翩不富以其鄰不戒以孚已過乎中泰已極矣故三隂翩然而下復不待富而其類從之不待戒令而信也其占為有小人合交以害正道君子所當戒也隂虛陽實故几言不富者皆隂爻也象曰翩翩不富皆失實也不戒以孚中心願也隂本居下在上為失實六五帝乙歸妹以祉元吉以隂居尊為泰之主柔中虛已下應九二吉之道也而帝乙歸妹之時亦嘗占得此爻占者如是則有祉而元吉矣凡經以古人為言如髙宗箕子之類者皆放此象曰以祉元吉中以行願也上六城復于隍勿用師自邑告命貞吝復房六反下同泰極而否城復于隍之象戒占者不可力爭但可自守雖得其貞亦不免於羞吝象曰城復于隍其命亂也命亂故復否告命所以治之也治平聲坤下乾上否之匪人不利君子貞大往小來否備鄙反否閉塞也七月之卦也正與泰反故曰匪人謂非人道也其占不利於君子之正道蓋乾往居外坤來居內又自漸卦而來則九往居四六來居三也或疑之匪人三字衍文由比六三而誤也傳不特解其義亦可見彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也象曰天地不交否君子以儉德辟難不可榮以祿辟音避難去聲收斂其德不形於外以避小人之難人不得以祿位榮之初六拔茅茹以其彚貞吉亨三隂在下當否之時小人連類而進之象而初之惡則未形也故戒其貞則吉而亨蓋能如是則變而為君子矣象曰拔茅貞吉志在君也小人而變為君子則能以愛君為念而不計其私矣六二包承小人吉大人否亨隂柔而中正小人而能包容承順乎君子之象小人之吉道也故占者小人如是則吉大人則當安守其否而後道亨蓋不可以彼包承於我而自失其守也象曰大人否亨不亂羣也言不亂於小人之羣六三包羞以隂居陽而不中正小人志於傷善而未能也故為包羞之象然以其未發故無凶咎之戒象曰包羞位不當也九四有命無咎疇離祉否過中矣將濟之時也九四以陽居隂不極其剛故其占為有命無咎而疇類三陽皆獲其福也命謂天命象曰有命無咎志行也九五休否大人吉其亡其亡繫于苞桑苞與包同古易作包陽剛中正以居尊位能休時之否大人之事也故此爻之占大人遇之則吉然又當戒懼如繫辭傳所云也象曰大人之吉位正當也上九傾否先否後喜以陽剛居否極能傾時之否者也其占為先否後喜象曰否終則傾何可長也離下乾上同人于野亨利涉大川利君子貞離亦三畫卦之名一隂麗於二陽之間故其德為麗為文明其象為火為日為電同人與人同也以離遇乾火上同於天六二得位得中而上應九五又卦唯一隂而五陽同與之故為同人于野謂曠逺而無私也有亨道矣以健而行故能涉川為卦內文明而外剛健六二中正而有應則君子之道也占者能如是則亨而又可涉險然必其所同合於君子之道乃為利也彖曰同人柔得位得中而應乎乾曰同人以卦體釋卦名義柔謂六二乾謂九五同人曰衍文同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志以卦德卦體釋卦辭通天下之志乃為大同不然則是私情之合而已何以致亨而利涉哉象曰天與火同人君子以類族辨物天在上而火炎上其性同也類族辨物所以審異而致同也初九同人于門無咎同人之初未有私主以剛在下上無係應可以無咎故其象占如此象曰出門同人又誰咎也六二同人于宗吝宗黨也六二雖中且正然有應於上不能大同而係於私吝之道也故其象占如此象曰同人于宗吝道也九三伏戎于莽升其髙陵三嵗不興莽莫蕩反剛而不中上無正應欲同於二而非其正懼九五之見攻故有此象象曰伏戎于莽敵剛也三嵗不興安行也言不能行九四乘其墉弗克攻吉墉音庸剛不中正又無應與亦欲同於六二而為三所隔故為乘墉以攻之象然以剛居柔故有自反而不克攻之象占者如是則是能改過而得吉也象曰乘其墉義弗克也其吉則困而反則也乘其墉矣則非其力之不足也特以義之弗克而不攻耳能以義斷困而反於法則故吉也九五同人先號咷而後笑大師克相遇號户羔反咷道刀反旅卦同五剛中正二以柔中正相應於下同心者也而為三四所隔不得其同然義理所同物不得而間之故有此象然六二柔弱而三四剛強故必用大師以勝之然後得相遇也象曰同人之先以中直也大師相遇言相克也直謂理直上九同人于郊無悔居外無應物莫與同然亦可以無悔故其象占如此郊在野之內未至於曠逺但荒僻無與同耳象曰同人于郊志未得也乾下離上大有元亨大有所有之大也離居乾上火在天上無所不照又六五一隂居尊得中而五陽應之故為大有乾健離明居尊應天有亨之道占者有其德則大善而亨也彖曰大有柔得尊位大中而上下應之曰大有以卦體釋卦名義柔謂六五上下謂五陽其德剛健而文明應乎天而時行是以元亨以卦德卦體釋卦辭應天指六五也象曰火在天上大有君子以遏惡揚善順天休命火在天上所照者廣為大有之象所有既大無以治之則釁蘖萌於其間矣天命有善而無惡故遏惡揚善所以順天反之於身亦若是而已矣初九無交害匪咎艱則無咎雖當大有之時然以陽居下上無係應而在事初未涉乎害者也何咎之有然亦必艱以處之則無咎戒占者宜如是也象曰大有初九無交害也九二大車以載有攸往無咎剛中在下得應乎上為大車以載之象有所往而如是可以無咎矣占者必有此德乃應其占也象曰大車以載積中不敗也九三公用亨於天子小人弗克亨春秋傳作享謂朝獻也古者亨通之亨享獻之享烹飪之烹皆作亨字九三居下之上公侯之象剛而得正上有六五之君虛中下賢故為亨于天子之象占者有其德則其占如是小人無剛正之德則雖得此爻不能當也象曰公用亨于天子小人害也九四匪其彭無咎彭蒲光反音旁彭字音義未詳程傳曰盛貌理或當然六五柔中之君九四以剛近之有僭逼之嫌然以其處柔也故有不極其盛之象而得無咎戒占者宜如是也象曰匪其彭無咎明辨晳也晳明貌六五厥孚交如威如吉大有之世柔順而中以處尊位虛己以應九二之賢而上下歸之是其孚信之交也然君道貴剛太柔則廢當以威濟之則吉故其象占如此亦戒辭也象曰厥孚交如信以發志也一人之信足以發上下之志也威如之吉易而無備也易以䜴反太柔則人將易之而無畏備之心上九自天祐之吉無不利大有之世以剛居上而能下從六五是能履信思順而尚賢也滿而不溢故其占如此象曰大有上吉自天祐也艮下坤上謙亨君子有終謙者有而不居之義止乎內而順乎外謙之意也山至髙而地至卑乃屈而止於其下謙之象也占者如是則亨通而有終矣有終謂先屈而後伸也彖曰謙亨天道下濟而光明地道卑而上行上時掌反言謙之必亨天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也惡烏路反好呼報反變謂傾壞流謂聚而歸之人能謙則其居尊者其德愈光其居卑者人亦莫能過此君子所以有終也象曰地中有山謙君子以裒多益寡稱物平施裒蒲侯反稱尺證反施始䜴反以卑藴高謙之象也裒多益寡所以稱物之宜而平其施損高增卑以趣於平亦謙之意也初六謙謙君子用涉大川吉以柔處下謙之至也君子之行也以此涉難何往不濟故占者如是則利以涉川也象曰謙謙君子卑以自牧也六二鳴謙貞吉柔順中正以謙有聞正而且吉者也故其占如此象曰鳴謙貞吉中心得也九三勞謙君子有終吉卦唯一陽居下之上剛而得正上下所歸有功勞而能謙尤人所難故有終而吉占者如是則如其應矣象曰勞謙君子萬民服也六四無不利撝謙撝呼回反與揮同柔而得正上而能下其占無不利矣然居九三之上故戒以更當發揮其謙以示不敢自安之意也象曰無不利撝謙不違則也言不為過六五不富以其鄰利用侵伐無不利以柔居尊在上而能謙者也故為不富而能以其鄰之象蓋從之者衆矣猶有未服者則利以征之而於他事亦無不利人有是德則如其占也象曰利用侵伐征不服也上六鳴謙利用行師征邑國謙極有聞人之所與故可用行師然以其質柔而無位故可以征已之邑國而已象曰鳴謙志未得也可用行師征邑國也隂柔無位才力不足故其志未得而至於行師然亦適足以治其私邑而已坤下震上豫利建侯行師豫和樂也人心和樂以應其上也九四一陽上下應之其志得行又以坤遇震為順以動故其卦為豫而其占利以立君用師也彖曰豫剛應而志行順以動豫以卦體卦德釋卦名義豫順以動故天地如之而況建侯行師乎以卦德釋卦辭天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉極言之而贊其大也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考雷出地奮和之至也先王作樂既象其聲又取其義殷盛也初六鳴豫凶隂柔小人上有强援得時主事故不勝其豫而以自鳴凶之道也故其占如此卦之得名本為和樂然卦辭為衆樂之義爻辭除九四與卦同外皆為自樂所以有吉凶之異象曰初六鳴豫志窮凶也窮謂滿極六二介于石不終日貞吉豫雖主樂然易以溺人溺則反而憂矣卦獨此爻中而得正是上下皆溺於豫而獨能以中正自守其介如石也其德安靜而堅確故其思慮明審不俟終日而見凡事之幾微也大學曰安而后能慮慮而后能得意正如此占者如是則正而吉矣象曰不終日貞吉以中正也六三盱豫悔遲有悔盱況于反盱上視也隂不中正而近於四四為卦主故六三上視於四而下溺於豫宜有悔者也故其象如此而其占為事當速悔若悔之遲則必有悔也象曰盱豫有悔位不當也九四由豫大有得勿疑朋盍簪簪側林反九四卦之所由以為豫者也故其象如此而其占為大有得然又當至誠不疑則朋類合而從之矣故又因而戒之簪聚也又速也象曰由豫大有得志大行也六五貞疾恆不死當豫之時以柔居尊沈溺於豫又乘九四之剛衆不附而處勢危故為貞疾之象然以其得中故又為恆不死之象即象而觀占在其中矣象曰六五貞疾乘剛也恆不死中未亡也上六冥豫成有渝無咎渝以朱反以隂柔居豫極為昏冥於豫之象以其動體故又為其事雖成而能有渝之象戒占者如是則能補過而無咎所以廣遷善之門也象曰冥豫在上何可長也震下兌上隨元亨利貞無咎隨從也以卦變言之本自困卦九來居初又自噬嗑九來居五而自未濟來者兼此二變皆剛來隨柔之義以二體言之為此動而彼說亦隨之義故為隨已能隨物物來隨已彼此相從其通易矣故其占為元亨然必利於貞乃得無咎若所隨不貞則雖大亨而不免於有咎矣春秋傳穆姜曰有是四德隨而無咎我皆無之豈隨也哉今按四德雖非本義然其下云云深得占法之意彖曰隨剛來而下柔動而說隨下遐嫁反說音悅以卦變卦德釋卦名義大亨貞無咎而天下隨時王肅本時作之今當從之釋卦辭言能如是則天下之所從也隨時之義大矣哉王肅本時字在之字下今當從之象曰澤中有雷隨君子以嚮晦入宴息雷藏澤中隨時休息初九官有渝貞吉出門交有功卦以物隨為義爻以隨物為義初九以陽居下為震之主卦之所以為隨者也既有所隨則有所偏主而變其常矣惟得其正則吉又當出門以交不私其隨則有功也故其象占如此亦因以戒之象曰官有渝從正吉也出門交有功不失也六二係小子失丈夫初陽在下而近五陽正應而逺二隂柔不能自守以須正應故其象如此凶吝可知不假言矣象曰係小子弗兼與也六三係丈夫失小子隨有求得利居貞丈夫謂九四小子亦謂初也三近係四而失於初其象與六二正相反四陽當任而已隨之有求必得然非正應故有不正而為邪媚之嫌故其占如此而又戒以居貞也象曰係丈夫志舍下也舍音捨九四隨有獲貞凶有孚在道以明何咎九四以剛居上之下與五同德故其占隨而有獲然勢陵於五故雖正而凶惟有孚在道而明則上安而下從之可以無咎也占者當時之任宜審此戒象曰隨有獲其義凶也有孚在道明功也九五孚于嘉吉陽剛中正下應中正是信于善也占者如是其吉宜矣象曰孚于嘉吉位正中也上六拘係之乃從維之王用亨于西山居隨之極隨之固結而不可解者也誠意之極可通神明故其占為王用亨于西山亨亦當作祭享之享自周而言岐山在西凡筮祭山川者得之其誠意如是則吉也象曰拘係之上窮也窮極也巽下艮上蠱元亨利涉大川先甲三日後甲三日先息薦反後胡豆反蠱壞極而有事也其卦艮剛居上巽柔居下上下不交下卑巽而上苟止故其卦為蠱或曰剛上柔下謂卦變自賁來者初上二下自井來者五上上下自既濟來者兼之亦剛上而柔下皆所以為蠱也蠱壞之極亂當復治故其占為元亨而利涉大川甲日之始事之端也先甲三日辛也後甲三日丁也前事過中而將壞則可自新以為後事之端而不使至于大壞後事方始而尚新然更當致其丁寧之意以監其前事之失而不使至於速壞聖人之戒深也彖曰蠱剛上而柔下巽而止蠱以卦體卦變卦德釋卦名義蓋如此則積弊而至於蠱矣蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也釋卦辭治蠱至於元亨則亂而復治之象也亂之終治之始天運然也象曰山下有風蠱君子以振民育德山下有風物壞而有事矣而事莫大於二者乃治已治人之道也初六幹父之蠱有子考無咎厲終吉幹如木之幹枝葉之所附而立者也蠱者前人已壞之緒故諸爻皆有父母之象子能幹之則飭治而振起矣初六蠱未深而事易濟故其占為有子則能治蠱而考得無咎然亦危矣戒占者宜如是又知危而能戒則終吉也象曰幹父之蠱意承考也九二幹母之蠱不可貞九二剛中上應六五子幹母蠱而得中之象以剛承柔而治其壞故又戒以不可堅貞言當巽以入之也象曰幹母之蠱得中道也九三幹父之蠱小有悔無大咎過剛不中故小有悔巽體得正故無大咎象曰幹父之蠱終無咎也六四裕父之蠱往見吝以隂居隂不能有為寬裕以治蠱之象也如是則蠱將日深故往則見吝戒占者不可如是也象曰裕父之蠱往未得也六五幹父之蠱用譽柔中居尊而九二承之以德以此幹蠱可致聞譽故其象占如此象曰幹父用譽承以德也上九不事王侯高尚其事剛陽居上在事之外故為此象而占與戒皆在其中矣象曰不事王侯志可則也兌下坤上臨元亨利貞至于八月有凶臨進而淩逼於物也二陽浸長以逼於隂故為臨十二月之卦也又其為卦下兌說上坤順九二以剛居中上應六五故占者大亨而利於正然至於八月當有凶也八月謂自復卦一陽之月至于遁卦二隂之月隂長陽遁之時也或曰八月謂夏正八月於卦為觀亦臨之反對也又因占而戒之彖曰臨剛浸而長長丁丈反以卦體釋卦名說而順剛中而應說音悅又以卦德卦體言卦之善大亨以正天之道也當剛長之時又有此善故其占如此也至于八月有凶消不久也言雖天運之當然然君子宜知所戒象曰澤上有地臨君子以教思無窮容保民無疆思去聲地臨於澤上臨下也二者皆臨下之事教之無窮者兌也容之無疆者坤也初九咸臨貞吉卦唯二陽遍臨四隂故二爻皆有咸臨之象初九剛而得正故其占為貞吉象曰咸臨貞吉志行正也九二咸臨吉無不利剛得中而勢上進故其占吉而無不利也象曰咸臨吉無不利未順命也未詳六三甘臨無攸利既憂之無咎隂柔不中正而居下之上為以甘說臨人之象其占固無所利然能憂而改之則無咎也勉人遷善為教深矣象曰甘臨位不當也既憂之咎不長也六四至臨無咎處得其位下應初九相臨之至宜無咎者也象曰至臨無咎位當也六五知臨大君之宜吉知音智以柔居中下應九二不自用而任人乃知之事而大君之宜吉之道也象曰大君之宜行中之謂也上六敦臨吉無咎居卦之上處臨之終敦厚於臨吉而無咎之道也故其象占如此象曰敦臨之吉志在內也坤下巽上觀盥而不薦有孚顒若觀官奐反下大觀以觀之觀大象觀字並同觀者有以示人而為人所仰也九五居上四隂仰之又肉順外巽而九五以中正示天下所以為觀盥將祭而潔手也薦奉酒食以祭也顒然尊敬之貌言致其潔清而不輕自用則其孚信在中而顒然可仰戒占者當如是也或曰有孚顒若謂在下之人信而仰之也此卦四隂長而二陽消正為八月之卦而名卦繫辭更取他義亦扶陽抑隂之意彖曰大觀在上順而巽中正以觀天下以卦體卦德釋卦名義觀盥而不薦有孚顒若下觀而化也觀如字下觀天大象觀民之觀六爻觀字並同釋卦辭觀天之神道而四時不忒聖人以神道設教而天下服矣極言觀之道也四時不忒天之所以為觀也神道設教聖人之所以為觀也象曰風行地上觀先王以省方觀民設教省悉井反省方以觀民設教以為觀初六童觀小人無咎君子吝卦以觀示為義據九五為主也爻以觀瞻為義皆觀乎九五也初六隂柔在下不能逺見童觀之象小人之道君子之羞也故其占在小人則無咎君子得之則可羞矣象曰初六童觀小人道也六二窺觀利女貞隂柔居內而觀乎外窺觀之象女子之正也故其占如此丈夫得之則非所利矣象曰窺觀女貞亦可醜也在丈夫則為醜也六三觀我生進退我生我之所行也六三居下之上可進可退故不觀九五而獨觀已所行之通塞以為進退占者宜自審也象曰觀我生進退未失道也六四觀國之光利用賔于王六四最近於五故有此象其占為利於朝覲仕進也象曰觀國之光尚賓也九五觀我生君子無咎九五陽剛中正以居尊位其下四隂仰而觀之君子之象也故戒居此位得此占者當觀已所行必其陽剛中正亦如是焉則得無咎也象曰觀我生觀民也此夫子以義言之明人君觀己所行不但一身之得失又當觀民德之善否以自省察也上九觀其生君子無咎上九陽剛居尊位之上雖不當事任而亦為下所觀故其戒辭略與五同但以我為其小有主賔之異耳象曰觀其生志未平也志未平言雖不得位未可忘戒懼也震下離上噬嗑亨利用獄噬市利反嗑胡臘反噬齧也嗑合也物有間者齧而合之也為卦上下兩陽而中虛順口之象九四一陽間於其中必齧之而後合故為噬嗑其占當得亨通者有間故不通齧之而合則亨通矣又三隂三陽剛柔中半下動上明下雷上電本自益卦六四之柔上行以至於五而得其中是以隂居陽雖不當位而利用獄蓋治獄之道唯威與明而得其中之為貴故筮得之者有其德則應其占也彖曰頥中有物曰噬嗑以卦體釋卦名義噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也上時掌反又以卦名卦體卦德二象卦變釋卦辭象曰雷電噬嗑先王以明罰敕法雷電當作電雷初九屨校滅趾無咎校音教初上無位為受刑之象中四爻為用刑之象初在卦始罪薄過小又在卦下故為屨校滅趾之象止惡於初故得無咎占者小傷而無咎也象曰屨校滅趾不行也滅趾又有不進於惡之象六二噬膚滅鼻無咎祭有膚鼎蓋肉之柔脆噬而易嗑者六二中正故其所治如噬膚之易然以柔乘剛故雖甚易亦不免於傷滅其鼻占者雖傷而終無咎也象曰噬膚滅鼻乘剛也六三噬臘肉遇毒小吝無咎臘音昔臘肉謂獸臘全體骨而為之者堅韌之物也隂柔不中正治人而人不服為噬臘遇毒之象占雖小吝然時當噬嗑於義為無咎也象曰遇毒位不當也九四噬乾胏得金矢利艱貞吉乾音干胏緇美反胏肉之帶骨者與胾通周禮獄訟入鈞金束矢而後聽之九四以剛居柔得用刑之道故有此象言所噬愈堅而得聽訟之宜也然必利於艱難正固則吉戒占者宜如是也象曰利艱貞吉未光也六五噬乾肉得黃金貞厲無咎噬乾肉難於膚而易於臘胏者也黃中色金亦謂鈞金六五柔順而中以居尊位用刑於人人無不服故有此象然必貞厲乃得無咎亦戒占者之辭也象曰貞厲無咎得當也上九何校滅耳凶何何可反何負也過極之陽在卦之上惡極罪大凶之道也故其象占如此象曰何校滅耳聰不明也滅耳蓋罪其聽之不聰也若能審聽而早圖之則無此凶矣離下艮上賁亨小利有攸往賁彼僞反賁飾也卦自損來者柔自三來而文二剛自二上而文三自既濟而來者柔自上來而文五剛自五上而文上乂內離而外艮有文明而各得其分之象故為賁占者以其柔來文剛陽得隂助而離明於內故為亨以其剛上文柔而艮止於外故小利有攸往彖曰賁亨亨字疑衍柔來而文剛故亨分剛上而文柔故小利有攸往天文也以卦變釋卦辭剛柔之交自然之象故曰天文先儒說天文上當有剛柔交錯四字理或然也文明以止人文也又以卦德言之止謂各得其分觀乎天文以察時變觀乎人文以化成天下極言賁道之大也象曰山下有火賁君子以明庶政無敢折獄山下有火明不及逺明庶政事之小者折獄事之大者內離明而外艮止故取象如此初九賁其趾舍車而徒舍音捨剛德明體自賁於下為舍非道之車而安於徒步之象占者自處當如是也象曰舍車而徒義弗乘也君子之取舍決於義而已六二賁其須二以隂柔居中正三以陽剛而得正皆無應與故二附三而動有賁須之象占者宜從上之陽剛而動也象曰賁其須與上興也九三賁如濡如永貞吉一陽居二隂之間得其賁而潤澤者也然不可溺於所安故有永貞之戒象曰永貞之吉終莫之陵也六四賁如皤如白馬翰如匪寇婚媾皤白波反皤白也馬人所乘人白則馬亦白矣四與初相賁者乃為九三所隔而不得遂故皤如而其往求之心如飛翰之疾也然九三剛正非為寇者也乃求婚媾耳故其象如此象曰六四當位疑也匪寇婚媾終無尤也當位疑謂所當之位可疑也終無尤謂若守正而不與亦無他患也六五賁于丘園束帛戔戔吝終吉戔在千反又音箋六五柔中為賁之主敦本尚實得賁之道故有丘園之象然隂性吝嗇故有束帛戔戔之象束帛薄物戔戔淺小之意人而如此雖可羞吝然禮奢寧儉故得終吉象曰六五之吉有喜也上九白賁無咎賁極反本復於無色善補過矣故其象占如此象曰白賁無咎上得志也坤下艮上剝不利有攸往剝落也五隂在下而方生一陽在上而將盡隂盛長而陽消落九月之卦也隂盛陽衰小人壯而君子病又內坤而外艮有順時而止之象故占得之者不可有所往也彖曰剝剝也柔變剛也以卦體釋卦名義言柔進于陽變剛為柔也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也長丁丈反以卦體卦德釋卦辭象曰山附於地剝上以厚下安宅初六剝牀以足蔑貞凶剝自下起滅正則凶故其占如此蔑滅也象曰剝牀以足以滅下也六二剝牀以辨蔑貞凶辨音辦辨牀幹也進而上矣象曰剝牀以辨未有與也言未大盛六三剝之無咎衆隂方剝陽而已獨應之去其黨而從正無咎之道也占者如是則得無咎象曰剝之無咎失上下也上下謂四隂六四剝牀以膚凶隂禍切身故不復言蔑貞而直言凶也象曰剝牀以膚切近災也六五貫魚以宫人寵無不利魚隂物宫人隂之美而受制於陽者也五為衆隂之長當率其類受制於陽故有此象而占者如是則無不利也象曰以宫人寵終無尤也上九碩果不食君子得輿小人剝廬一陽在上剝未盡而能復生君子在上則為衆隂所載小人居之則剝極於上自失所覆而無復碩果得輿之象矣取象既明而君子小人其占不同聖人之情益可見矣象曰君子得輿民所載也小人剝廬終不可用也震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往反復之復方福反又作覆彖同復陽復生於下也剝盡則為純坤十月之卦而陽氣已生於下矣積之踰月然後一陽之體始成而來復故十有一月其卦為復以其陽既往而復反故有亨道乂內震外坤有陽動於下而以順上行之象故其占又為己之出入既得無疾朋類之來亦得無咎又自五月姤卦一隂始生至此七爻而一陽來復乃天運之自然故其占又為反復其道至於七日當得來復又以剛德方長故其占又為利有攸往也反復其道往而復來來而復往之意七日者所占來復之期也彖曰復亨剛反剛反則亨動而以順行是以出入無疾朋來無咎以卦德而言反復其道七日來復天行也隂陽消息天運然也利有攸往剛長也長丁丈反以卦體而言既生則漸長矣復其見天地之心乎積隂之下一陽復生天地生物之心幾於滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也程子論之詳矣而邵子之詩亦曰冬至子之半天心無改移一陽初動處萬物未生時𤣥酒味方淡太音聲正希此言如不信更請問包羲至哉言也學者宜盡心焉象曰雷在地中復先王以至日閉關商旅不行后不省方安靜以養微陽也月令是月齊戒掩身以待隂陽之所定初九不逺復無祗悔元吉祗音其一陽復生於下復之主也祗抵也又居事初失之未逺能復於善不抵於悔大善而吉之道也故其象占如此象曰不逺之復以修身也六二休復吉柔順中正近於初九而能下之復之休美吉之道也象曰休復之吉以下仁也下遐嫁反六三頻復厲無咎以隂居陽不中不正又處動極復而不固屢失屢復之象屢失故危復則無咎故其占又如此象曰頻復之厲義無咎也六四中行獨復四處羣隂之中而獨與初應為與衆俱行而獨能從善之象當此之時陽氣甚微未足以有為故不言吉然理所當然吉凶非所論也董子曰仁人者正其誼不謀其利明其道不計其功於剝之六三及此爻見之象曰中行獨復以從道也六五敦復無悔以中順居尊而當復之時敦復之象無悔之道也象曰敦復無悔中以自考也考成也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征眚生領反以隂柔居復終終迷不復之象凶之道也故其占如此以猶及也象曰迷復之凶反君道也震下乾上無妄元亨利貞其匪正有眚不利有攸往無妄實理自然之謂史記作無望謂無所期望而有得焉者其義亦通為卦自訟而變九自二來而居於初又為震主動而不妄者也故為無妄又二體震動而乾健九五剛中而應六二故其占大亨而利於正若其不正則有眚而不利有所往也彖曰無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉以卦變卦德卦體言卦之善如此故其占當獲大亨而利於正乃天命之當然也其有不正則不利有所往欲何往哉蓋其逆天之命而天不祐之故不可以有行也象曰天下雷行物與無妄先王以茂對時育萬物天下雷行震動發生萬物各正其性命是物物而與之以無妄也先王法此以對時育物因其所性而不為私焉初九無妄往吉以剛在內誠之主也如是而往其吉可知故其象占如此象曰無妄之往得志也六二不耕穫不菑畬則利有攸往菑側其反畬音餘柔順中正因時順理而無私意期望之心故有不耕穫不菑畬之象言其無所為於前無所冀於後也占者如是則利有所往矣象曰不耕穫未富也富如非富天下之富言非計其利而為之也六三無妄之災或繫之牛行人之得邑人之災卦之六爻皆無妄者也六三處不得正故遇其占者無故而有災如行人牽牛以去而居者反遭詰捕之擾也象曰行人得牛邑人災也九四可貞無咎陽剛乾體下無應與可固守而無咎不可以有為之占也象曰可貞無咎固有之也有猶守也九五無妄之疾勿藥有喜乾剛中正以居尊位而下應亦中正無妄之至也如是而有疾勿藥而自愈矣故其象占如此象曰無妄之藥不可試也既已無妄而復藥之則反為妄而生疾矣試謂少嘗之也上九無妄行有眚無攸利上九非有妄也但以其窮極而不可行耳故其象占如此象曰無妄之行窮之災也乾下艮上大畜利貞不家食吉利涉大川畜敕六反大陽也以艮畜乾又畜之大者也又以內乾剛健外艮篤實輝光是以能日新其德而為畜之大也以卦變言此卦自需而來九自五而上以卦體言六五尊而尚之以卦德言又能止健皆非大正不能故其占為利貞而不家食吉也又六五下應於乾為應乎天故其占又為利涉大川也不家食謂食祿於朝不食於家也彖曰大畜剛健篤實輝光日新其德以卦德釋卦名義剛上而尚賢能止健大正也以卦變卦體卦德釋卦辭不家食吉養賢也亦取尚賢之象利涉大川應乎天也亦以卦體而言象曰天在山中大畜君子以多識前言往行以畜其德識如字又音志行下孟反天在山中不必實有是事但以其象言之耳初九有厲利已已夷止反乾之三陽為艮所止故內外之卦各取其義初九為六四所止故其占往則有危而利於止也象曰有厲利己不犯災也九二輿說輹說吐活反輹音服又音福九二亦為六五所畜以其處中故能自止而不進有此象也象曰輿說輹中無尤也九三良馬逐利艱貞曰間輿衛利有攸往三以陽居健極上以陽居畜極極而通之時也又皆陽爻故不相畜而俱進有良馬逐之象焉然過剛鋭進故其占必戒以艱貞間習乃利於有往也曰當為日月之日象曰利有攸往上合志也六四童牛之牿元吉牿古毒反童者未角之稱牿施橫木於牛角以防其觸詩所謂福衡者也止之於未角之時為力則易大善之吉也故其象占如此學記曰禁於未發之謂豫正此意也象曰六四無吉有喜也六五豶豕之牙吉豶符云反陽已進而止之不若初之易矣然以柔居中而當尊位是以得其機會而可制故其象如此占雖吉而不言元也象曰六五之吉有慶也上九何天之衢亨何天之衢言何其通達之甚也畜極而通豁達無礙故其象占如此象曰何天之衢道大行也震下艮上頥貞吉觀頥自求口實頥以之反頥口旁也口食物以自養故為養義為卦上下二陽內含四隂外實內虛上止下動為頥之象養之義也貞吉者占者得正則吉觀頥謂觀其所養之道自求口實謂觀其所以養身之術皆得正則吉也彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也釋卦辭天地養萬物聖人養賢以及萬民頥之時大矣哉極言養道而贊之象曰山下有雷頥君子以慎言語節飲食二者養德養身之切務初九舍爾靈龜觀我朵頥凶舍音捨朵多果反靈龜不食之物朵垂也朵頥欲食之貌初九陽剛在下足以不食乃上應六四之隂而動於欲凶之道也故其象占如此象曰觀我朵頥亦不足貴也六二顛頥拂經于丘頥征凶求養於初則顛倒而違於常理求養於上則往而得凶丘土之高者上之象也象曰六二征凶行失類也初上皆非其類也六三拂頥貞凶十年勿用無攸利隂柔不中正以處動極拂於頥矣既拂於頥雖正亦凶故其象占如此象曰十年勿用道大悖也六四顛頥吉虎視耽耽其欲逐逐無咎耽都含反柔居上而得正所應又正而賴其養以施於下故雖顛而吉虎視耽耽下而專也其欲逐逐求而繼也又能如是則無咎矣象曰顛頥之吉上施光也施始䜴反六五拂經居貞吉不可涉大川六五隂柔不正居尊位而不能養人反賴上九之養故其象占如此象曰居貞之吉順以從上也上九由頥厲吉利涉大川六五賴上九之養以養人是物由上九以養也位高任重故厲而吉陽剛在上故利涉川象曰由頥厲吉大有慶也巽下兌上大過棟橈利有攸往亨橈乃教反大陽也四陽居中過盛故為大過上下二隂不勝其重故有棟橈之象又以四陽雖過而二五得中內巽外說有可行之道故利有所往而得亨也彖曰大過大者過也以卦體釋卦名義棟橈本末弱也復以卦體釋卦辭本謂初末謂上弱謂隂柔剛過而中巽而說行利有攸往乃亨說音悅又以卦體卦德釋卦辭大過之時大矣哉大過之時非有大過人之材不能濟也故歎其大象曰澤滅木大過君子以獨立不懼遁世無悶澤滅於木大過之象也不懼無悶大過之行也初六藉用白茅無咎藉在夜反當大過之時以隂柔居巽下過於畏慎而無咎者也故其象占如此白茅物之潔者象曰藉用白茅柔在下也九二枯楊生梯老夫得其女妻無不利梯吐兮反陽過之始而比初隂故其象占如此梯根也榮於下者也榮於下則生於上矣夫雖老而得女妻猶能成生育之功也象曰老夫女妻過以相與也九三棟橈凶三四二爻居卦之中棟之象也九三以剛居剛不勝其重故象橈而占凶象曰棟橈之凶不可以有輔也九四棟隆吉有它吝它湯何反以陽居隂過而不過故其象隆而占吉然下應初六以柔濟之則過於柔矣故又戒以有它則吝也象曰棟隆之吉不橈乎下也九五枯楊生華老婦得其士夫無咎無譽華如字九五陽過之極又比過極之隂故其象占皆與二反象曰枯楊生華何可久也老婦士夫亦可醜也上六過涉滅頂凶無咎處過極之地才弱不足以濟然於義為無咎矣蓋殺身成仁之事故其象占如此象曰過涉之凶不可咎也坎下坎上習坎有孚維心亨行有尚習重習也坎險陷也其象為水陽陷隂中外虛而中實也此卦上下皆坎是為重險中實為有孚心亨之象以是而行必有功矣故其占如此彖曰習坎重險也重直龍反釋卦名義水流而不盈行險而不失其信以卦象釋有孚之義言內實而行有常也維心亨乃以剛中也行有尚往有功也以剛在中心亨之象如是而往必有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉極言之而贊其大也象曰水洊至習坎君子以常德行習教事洊在薦反行下孟反治已治人皆必重習然後熟而安之初六習坎入于坎窞凶窞徒坎陵感二反以隂柔居重險之下其陷益深故其象占如此象曰習坎入坎失道凶也九二坎有險求小得處重險之中未能自出故為有險之象然剛而得中故其占可以求小得也象曰求小得未出中也六三來之坎坎險且枕入于坎窞勿用枕針甚反以隂柔不中正而履重險之間來往皆險前險而後枕其陷益深不可用也故其象占如此枕倚著未安之意象曰來之坎坎終無功也六四樽酒簋二用缶納約自牖終無咎簋音軌缶俯九反朝氏云先儒讀樽酒簋為一句二用缶為一句今從之二益之也周禮大祭三二弟子職左執虛豆右執挾匕周旋而二是也九五尊位六四近之在險之時剛柔相際故有但用薄禮益以誠心進結自牖之象牖非所由之正而室之所以受明也始雖艱阻終得無咎故其占如此象曰樽酒簋二剛柔際也朝氏曰陸氏釋文本無二字今從之九五坎不盈祗既平無咎九五雖在坎中然以陽剛中正居尊位而時亦將出矣故其象占如此象曰坎不盈中未大也有中德而未大上六係用徽纆置于叢棘三嵗不得凶纆音墨置音置以隂柔居險極故其象占如此象曰上六失道凶三嵗也離下離上離利貞亨畜牝牛吉畜許六反離麗也隂麗於陽其象為火體隂而用陽也物之所麗貴乎得正牝牛柔順之物也故占者能正則亨而畜牝牛則吉也彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下重直龍反釋卦名義柔麗乎中正故亨是以畜牝牛吉也以卦體釋卦辭象曰明兩作離大人以繼明照于四方作起也初九履錯然敬之無咎錯七各反以剛居下而處明體志欲上進故有履錯然之象敬之則無咎矣戒占者宜如是也象曰履錯之敬以辟咎也辟避同六二黃離元吉黃中色柔麗乎中而得其正故其象占如此象曰黃離元吉得中道也九三日昃之離不鼓缶而歌則大耊之嗟凶耊田節反重離之間前明將盡故有日昃之象不安常以自樂則不能自處而凶矣戒占者宜如是也象曰日昃之離何可久也九四突如其來如焚如死如棄如突如忽反後明將繼之時而九四以剛迫之故其象如此象曰突如其來如無所容也無所容言焚死棄也六五出涕沱若戚嗟若吉沱徒何反以隂居尊柔麗乎中然不得其正而迫於上下之陽故憂懼如此然後得吉戒占者宜如是也象曰六五之吉離王公也離音麗上九王用出征有嘉折首獲匪其醜無咎剛明及逺威震而刑不濫無咎之道也故其象占如此象曰王用出征以正邦也周易本義卷一
